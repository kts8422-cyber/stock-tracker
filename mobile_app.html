<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SectorTrack">
<meta name="theme-color" content="#080b12">
<title>SectorTrack</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b12;--surface:#0f1520;--card:#131c2e;--border:#1c2a3e;
  --accent:#3b82f6;--accent-dim:rgba(59,130,246,.15);
  --green:#22c55e;--green-dim:rgba(34,197,94,.13);
  --red:#ef4444;--red-dim:rgba(239,68,68,.13);
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --nav-h:64px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.app-header{
  height:calc(52px + var(--safe-top));padding-top:var(--safe-top);
  background:rgba(8,11,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding-left:16px;padding-right:16px;flex-shrink:0;
}
.app-logo{font-family:var(--mono);font-size:.95rem;font-weight:500;letter-spacing:-.5px}
.app-logo em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.header-status{display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.header-status .hs-label{font-family:var(--mono);font-size:.58rem;color:var(--text3)}
.header-status .hs-date{font-family:var(--mono);font-size:.65rem;color:var(--text2)}
.sync-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.sync-btn:active{transform:scale(.9);background:var(--accent-dim);color:var(--accent)}
.sync-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px)}
.view{display:none}.view.active{display:block}

/* ── CALENDAR ── */
.cal-nav{display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 8px;position:sticky;top:0;z-index:10;
  background:rgba(8,11,18,.95);backdrop-filter:blur(10px)}
.cal-month-label{font-family:var(--mono);font-size:.95rem;font-weight:500;color:var(--text)}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:active{background:var(--accent-dim);color:var(--accent)}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);padding:0 8px 4px}
.cal-dow-cell{text-align:center;font-family:var(--mono);font-size:.6rem;color:var(--text3);padding:4px 0}
.cal-dow-cell.sun{color:#ef4444}.cal-dow-cell.sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:0 8px 8px;
  background:var(--border);border-radius:12px;overflow:hidden;margin:0 8px}
.cal-cell{background:var(--bg);min-height:72px;padding:5px 4px 4px;
  cursor:pointer;transition:background .12s;display:flex;flex-direction:column}
.cal-cell.empty{background:#070a10;cursor:default}
.cal-cell.weekend-sat .cal-day{color:#3b82f6}
.cal-cell.weekend-sun .cal-day{color:#ef4444}
.cal-cell.today{background:rgba(59,130,246,.07)}
.cal-cell.today .cal-day{background:var(--accent);color:#fff;border-radius:50%;
  width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-cell.has-data{background:#0c1220}
.cal-cell.has-data:active{background:#101928}
.cal-cell.selected{background:rgba(59,130,246,.12)!important;outline:1px solid var(--accent)}
.cal-day{font-family:var(--mono);font-size:.72rem;font-weight:500;color:var(--text2);
  line-height:1;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-sectors{display:flex;flex-direction:column;gap:1.5px;margin-top:1px}
.cal-sector-tag{font-family:var(--mono);font-size:.52rem;font-weight:500;line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 3px;border-radius:3px}
.cal-sector-tag.up{color:var(--green);background:var(--green-dim)}
.cal-sector-tag.dn{color:var(--red);background:var(--red-dim)}
.cal-sector-tag.flat{color:var(--text3);background:rgba(71,85,105,.12)}

/* ── DETAIL SHEET ── */
#detailSheet{position:fixed;inset:0;z-index:100;display:none;flex-direction:column;background:var(--bg)}
#detailSheet.open{display:flex}
.detail-header{display:flex;align-items:center;gap:12px;
  padding:calc(14px + var(--safe-top)) 16px 12px;border-bottom:1px solid var(--border);
  background:rgba(8,11,18,.96);backdrop-filter:blur(20px)}
.detail-back{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.detail-date-label{font-family:var(--mono);font-size:.9rem;font-weight:500}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px}
.detail-period-row{display:flex;gap:6px;align-items:center;margin-bottom:10px;flex-wrap:wrap}
.detail-period-row label{font-family:var(--mono);font-size:.62rem;color:var(--text3)}
.dperiod-tab{font-family:var(--mono);font-size:.66rem;padding:4px 10px;border-radius:16px;
  border:1px solid var(--border);background:transparent;color:var(--text3);cursor:pointer;white-space:nowrap;transition:all .15s}
.dperiod-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.detail-sector{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.detail-sector-head{display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px 8px;border-bottom:1px solid var(--border)}
.detail-sector-name{font-size:.76rem;font-weight:600;color:var(--text2)}
.detail-badges{display:flex;gap:4px;align-items:center}
.badge{font-family:var(--mono);font-size:.66rem;font-weight:500;padding:3px 7px;border-radius:7px}
.badge-lbl{font-size:.54rem;color:var(--text3);font-family:var(--mono)}
.badge.up{background:var(--green-dim);color:var(--green)}
.badge.dn{background:var(--red-dim);color:var(--red)}
.badge.flat{background:rgba(71,85,105,.15);color:var(--text3)}
.detail-stock{display:flex;justify-content:space-between;align-items:center;
  padding:8px 13px;border-bottom:1px solid rgba(28,42,62,.4)}
.detail-stock:last-child{border-bottom:none}
.ds-l{display:flex;flex-direction:column;gap:2px}
.ds-ticker{font-family:var(--mono);font-size:.8rem;font-weight:500}
.ds-name{font-size:.67rem;color:var(--text3)}
.ds-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.ds-price{font-family:var(--mono);font-size:.76rem;color:var(--text2)}
.chg-row{display:flex;gap:4px}
.mbadge{font-family:var(--mono);font-size:.62rem;font-weight:500;padding:2px 6px;border-radius:5px}
.mbadge.up{background:var(--green-dim);color:var(--green)}
.mbadge.dn{background:var(--red-dim);color:var(--red)}
.mbadge.flat{background:rgba(71,85,105,.15);color:var(--text3)}
.mbadge.sec{opacity:.75}

/* ── TABLE VIEW ── */
.table-date-bar{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:12px 14px 8px;
  background:rgba(8,11,18,.95);position:sticky;top:0;z-index:5;
  border-bottom:1px solid var(--border);
}
.date-range-group{display:flex;align-items:center;gap:6px}
.date-range-label{font-family:var(--mono);font-size:.62rem;color:var(--text3);white-space:nowrap}
.date-input{
  font-family:var(--mono);font-size:.72rem;padding:5px 8px;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  border-radius:8px;outline:none;cursor:pointer;width:112px;
}
.date-input:focus{border-color:var(--accent)}
.date-range-sep{font-family:var(--mono);font-size:.7rem;color:var(--text3)}
.quick-btns{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;flex:1}
.quick-btns::-webkit-scrollbar{display:none}
.quick-btn{font-family:var(--mono);font-size:.65rem;padding:4px 9px;border-radius:14px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.quick-btn:active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}

.table-section{padding:0 14px}
.table-section-title{font-family:var(--mono);font-size:.63rem;color:var(--text3);
  letter-spacing:.8px;text-transform:uppercase;padding:10px 0 5px;
  border-bottom:1px solid var(--border);margin-bottom:3px}
.table-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 4px;border-bottom:1px solid rgba(28,42,62,.4);gap:6px}
.table-row:last-child{border-bottom:none}
.tr-l{display:flex;flex-direction:column;gap:2px;min-width:80px}
.tr-ticker{font-family:var(--mono);font-size:.78rem;font-weight:500}
.tr-name{font-size:.66rem;color:var(--text3)}
.tr-m{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.tr-cap-label{font-family:var(--mono);font-size:.54rem;color:var(--text3);letter-spacing:.3px}
.tr-cap{font-family:var(--mono);font-size:.74rem;font-weight:500;color:var(--text)}
.tr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:72px}
.tr-price{font-family:var(--mono);font-size:.75rem;color:var(--text2)}
.divider{height:1px;background:var(--border);margin:0 14px 6px}

/* ── CHART VIEW ── */
.chart-section{padding:10px 14px}
.chart-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:4px}
.chart-tabs::-webkit-scrollbar{display:none}
.chart-tab{font-family:var(--mono);font-size:.66rem;padding:4px 11px;border-radius:14px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}

/* ── SETTINGS ── */
.settings-section{padding:14px}
.settings-title{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}
.sr-label{font-size:.8rem;color:var(--text)}
.sr-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.sr-action{font-family:var(--mono);font-size:.7rem;color:var(--accent);cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:rgba(8,11,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--text3);font-size:.58rem;font-family:var(--mono);
  border:none;background:none;padding-top:4px;transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:1.15rem;line-height:1}

/* LOADING */
#loadOverlay{position:fixed;inset:0;background:rgba(8,11,18,.9);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loadOverlay.show{display:flex}
.load-title{font-family:var(--mono);font-size:.82rem;color:var(--accent)}
.load-bar-bg{width:200px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.load-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.load-sub{font-family:var(--mono);font-size:.66rem;color:var(--text3)}
.load-cancel{font-family:var(--mono);font-size:.63rem;color:var(--text3);cursor:pointer;margin-top:4px;text-decoration:underline}

/* DATA CALENDAR MODAL */
#dataCalModal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  z-index:300;display:none;align-items:flex-end;justify-content:center}
#dataCalModal.open{display:flex}
.dcal-sheet{background:var(--surface);border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + var(--safe-bottom))}
.dcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dcal-title{font-family:var(--mono);font-size:.85rem;font-weight:500;color:var(--text)}
.dcal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.dcal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dcal-month{font-family:var(--mono);font-size:.8rem;color:var(--text)}
.dcal-nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.dcal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dcal-dow-cell{text-align:center;font-family:var(--mono);font-size:.58rem;color:var(--text3);padding:3px 0}
.dcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dcal-cell{min-height:52px;border-radius:8px;padding:4px 2px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--card);border:1px solid transparent}
.dcal-cell.empty{background:transparent;border-color:transparent}
.dcal-cell.has-data{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
.dcal-cell.today-cell{border-color:var(--accent)}
.dcal-day-num{font-family:var(--mono);font-size:.68rem;font-weight:500;color:var(--text2)}
.dcal-cell.weekend-sun .dcal-day-num{color:#ef4444}
.dcal-cell.weekend-sat .dcal-day-num{color:#3b82f6}
.dcal-cell.today-cell .dcal-day-num{color:var(--accent);font-weight:700}
.dcal-saved-label{font-family:var(--mono);font-size:.48rem;color:var(--green);
  background:var(--green-dim);padding:1px 4px;border-radius:4px;white-space:nowrap}
.dcal-stat{font-family:var(--mono);font-size:.65rem;color:var(--text3);
  margin-top:10px;text-align:center}

/* PASSWORD SCREEN */
#pwScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pw-logo{font-family:var(--mono);font-size:1.4rem;font-weight:500;letter-spacing:-.5px}
.pw-logo em{color:var(--accent);font-style:normal}
.pw-label{font-family:var(--mono);font-size:.72rem;color:var(--text3);letter-spacing:.5px}
.pw-dots{display:flex;gap:12px;margin:4px 0}
.pw-dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:background .15s}
.pw-dot.filled{background:var(--accent)}
.pw-error{font-family:var(--mono);font-size:.68rem;color:var(--red);height:16px}
.pw-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pw-btn{height:68px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--mono);font-size:1.3rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;-webkit-user-select:none;user-select:none}
.pw-btn:active{background:var(--accent-dim);border-color:var(--accent);transform:scale(.95)}
.pw-btn .sub{font-size:.48rem;color:var(--text3);letter-spacing:.5px}
.pw-btn.del{color:var(--text2)}
.pw-btn.empty{border-color:transparent;background:transparent;cursor:default}
.pw-loading{display:none;flex-direction:column;align-items:center;gap:10px;width:240px}
.pw-load-title{font-family:var(--mono);font-size:.74rem;color:var(--accent)}
.pw-load-bar-bg{width:100%;height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.pw-load-bar-fill{height:100%;background:var(--accent);border-radius:6px;width:0%;transition:width .3s}
.pw-load-pct{font-family:var(--mono);font-size:.68rem;color:var(--text2)}
.pw-load-hint{font-family:var(--mono);font-size:.64rem;color:var(--text3);text-align:center;line-height:1.6}

/* TOAST */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);
  left:50%;transform:translateX(-50%) translateY(18px);
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:.72rem;padding:8px 16px;border-radius:18px;
  opacity:0;transition:all .25s;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<!-- PASSWORD SCREEN -->
<div id="pwScreen">
  <div class="pw-logo">SECTOR<em>TRACK</em></div>
  <div class="pw-label">비밀번호를 입력하세요</div>
  <div class="pw-dots" id="pwDots">
    <div class="pw-dot" id="d0"></div>
    <div class="pw-dot" id="d1"></div>
    <div class="pw-dot" id="d2"></div>
    <div class="pw-dot" id="d3"></div>
  </div>
  <div class="pw-error" id="pwError"></div>
  <div class="pw-loading" id="pwLoading">
    <div class="pw-load-title">📡 데이터 불러오는 중...</div>
    <div class="pw-load-bar-bg"><div class="pw-load-bar-fill" id="pwBar"></div></div>
    <div class="pw-load-pct" id="pwPct">0%</div>
    <div class="pw-load-hint">로딩이 완료되면<br>화면이 열립니다</div>
  </div>
  <div class="pw-pad" id="pwPad">
    <button class="pw-btn" data-num="1">1</button>
    <button class="pw-btn" data-num="2">2<span class="sub">ABC</span></button>
    <button class="pw-btn" data-num="3">3<span class="sub">DEF</span></button>
    <button class="pw-btn" data-num="4">4<span class="sub">GHI</span></button>
    <button class="pw-btn" data-num="5">5<span class="sub">JKL</span></button>
    <button class="pw-btn" data-num="6">6<span class="sub">MNO</span></button>
    <button class="pw-btn" data-num="7">7<span class="sub">PQRS</span></button>
    <button class="pw-btn" data-num="8">8<span class="sub">TUV</span></button>
    <button class="pw-btn" data-num="9">9<span class="sub">WXYZ</span></button>
    <div class="pw-btn empty"></div>
    <button class="pw-btn" data-num="0">0</button>
    <button class="pw-btn del" id="pwDelBtn">⌫</button>
  </div>
</div>
<div class="app">
  <div class="app-header">
    <div class="app-logo">SECTOR<em>TRACK</em></div>
    <div class="header-right">
      <div class="header-status">
        <span class="hs-label">마지막 갱신</span>
        <span class="hs-date" id="lastSyncDate">—</span>
      </div>
      <div class="header-status" style="align-items:center">
        <span class="hs-label">환율</span>

let prices={},remotePrices={},profileData={},exchangeRate=1380;
let calYear=2026,calMonth=4;
let selectedDate=null,detailPeriodDays=21;
let tableBaseDate='',tableCompareDate='';
let currentView='calendar',chartInstance=null;

// ET 기준 오늘 날짜 (UTC-4 서머타임)
const ET_OFFSET = -4 * 60;
const now = new Date();
const etNow = new Date(now.getTime() + (ET_OFFSET - (-now.getTimezoneOffset())) * 60000);
const TODAY = etNow.toISOString().slice(0,10);
const totalStocks=SECTORS.reduce((a,s)=>a+s.stocks.length,0);

// ── PERSIST ──
// localStorage는 오늘 현재가(prices)만 저장, 나머지는 data.json 의존
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    // 오늘 날짜 데이터만 복원 (다른 날은 data.json에서)
    if(s.todayPrices) prices[TODAY]=s.todayPrices;
    if(s.detailPeriodDays) detailPeriodDays=s.detailPeriodDays;
    if(s.tableBaseDate) tableBaseDate=s.tableBaseDate;
    if(s.tableCompareDate) tableCompareDate=s.tableCompareDate;
  }catch(e){}
  // 기본값: 시작=1개월전, 종료=오늘
  if(!tableBaseDate){
    const idx=ALL_DATES.indexOf(TODAY);
    tableBaseDate=idx>=21?ALL_DATES[idx+21]:ALL_DATES[ALL_DATES.length-1];
  }
  if(!tableCompareDate) tableCompareDate=TODAY;
}
function save(){
  // 오늘 데이터만 localStorage에 저장
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    todayPrices: prices[TODAY]||{},
    detailPeriodDays, tableBaseDate, tableCompareDate
  }));
}

// ── REMOTE ──
async function loadRemote(onProgress){
  const _prog=onProgress||function(){};
  try{
    _prog(10);
    const r=await fetch('./data.json?t='+Date.now(),{
      cache:'no-store',
      headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}
    });
    if(r.ok){
      remotePrices=await r.json();
      const dates=Object.keys(remotePrices).sort().reverse();
      if(dates[0]) document.getElementById('lastSyncDate').textContent=dates[0];
    }
  }catch(e){ console.warn('data.json 로드 실패:', e); }

  _prog(50);
  // profile.json 로드 (발행주식수)
  try{
    const r=await fetch('./profile.json?t='+Date.now(),{cache:'no-store'});
    if(r.ok) profileData=await r.json();
  }catch(e){ console.warn('profile.json 로드 실패:', e); }

  _prog(80);
  // 환율 로드 (Finnhub forex)
  await fetchExchangeRate();
  _prog(100);
}

async function fetchExchangeRate(){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/forex/rates?base=USD&token=${FINNHUB_KEY}`);
    const d=await r.json();
    const krw=d?.quote?.KRW;
    if(krw && krw>0){
      exchangeRate=krw;
      document.getElementById('exchangeRateDisplay').textContent=
        Math.round(krw).toLocaleString()+'원';
    }
  }catch(e){
    document.getElementById('exchangeRateDisplay').textContent='1,380원';
  }
}

// ── PRICE HELPERS ──
function getPrice(sid,date){return prices[date]?.[sid]??remotePrices[date]?.[sid]??null;}
function getPrevDate(date){const i=ALL_DATES.indexOf(date);return(i>=0&&i<ALL_DATES.length-1)?ALL_DATES[i+1]:null;}
function getNDaysAgo(date,n){
  const i=ALL_DATES.indexOf(date);
  return(i>=0)?ALL_DATES[Math.min(i+n,ALL_DATES.length-1)]:null;
}
function getYTDStart(date){
  const yr=date.slice(0,4);
  return[...ALL_DATES].reverse().find(d=>d.startsWith(yr))||null;
}
function getChgBetween(sid,dateA,dateB){
  // A=최근, B=과거. A 기준 대비 B
  const cur=getPrice(sid,dateA),base=getPrice(sid,dateB);
  if(cur==null||base==null||base===0) return null;
  return{pct:(cur-base)/base*100,abs:cur-base};
}
function getChg(sid,date){return getChgBetween(sid,date,getPrevDate(date));}

// 시가총액 USD (빌리언)
function getMarketCapUSD(sid, price){
  if(price==null) return null;
  const prof=profileData[sid];
  if(!prof||!prof.shares||prof.shares===0) return null;
  // shares는 백만주 단위 → USD 빌리언 = price * shares / 1000
  return price * prof.shares / 1000;
}
// 시가총액 KRW (억 단위)
function getMarketCapKRW(sid, price){
  const usdB=getMarketCapUSD(sid,price);
  if(usdB==null) return null;
  return Math.round(usdB * 1000 * 1_000_000 * exchangeRate / 1_0000_0000);
}
function fmtCapUSD(b){
  if(b==null) return '—';
  if(b>=1000) return (b/1000).toFixed(1)+'T';
  return b.toFixed(1)+'B';
}
function fmtCapKRW(억){
  if(억==null) return '—';
  if(억>=10000) return (억/10000).toFixed(1)+'조';
  return Math.round(억).toLocaleString()+'억';
}
function getPeriodChgDetail(sid,date){
  const pd=getNDaysAgo(date,detailPeriodDays);
  return getChgBetween(sid,date,pd);
}
// 테이블용: baseDate 대비 compareDate
function getTableChg(sid){return getChgBetween(sid,tableBaseDate,tableCompareDate);}

function sectorAvgChg(sec,date){
  // 시가총액 가중평균 (전일대비)
  let ws=0,tc=0;
  sec.stocks.forEach(st=>{
    const chg=getChg(st.id,date);
    const cap=getMarketCapUSD(st.id,getPrice(st.id,date));
    if(chg!=null&&cap!=null&&cap>0){ws+=chg.pct*cap;tc+=cap;}
  });
  return tc>0?ws/tc:null;
}
// 섹터 평균: 특정 두 날짜 사이
function sectorAvgBetween(sec,dA,dB){
  // 시가총액 가중평균
  let weightedSum=0, totalCap=0;
  sec.stocks.forEach(st=>{
    const chg=getChgBetween(st.id,dA,dB);
    const price=getPrice(st.id,dA);
    const cap=getMarketCapUSD(st.id,price);
    if(chg!=null && cap!=null && cap>0){
      weightedSum+=chg.pct*cap;
      totalCap+=cap;
    }
  });
  return totalCap>0?weightedSum/totalCap:null;
}
// 섹터 합산 시총 (USD 빌리언)
function sectorTotalCapB(sec,date){
  let total=0;
  sec.stocks.forEach(st=>{
    const cap=getMarketCapUSD(st.id,getPrice(st.id,date));
    if(cap!=null) total+=cap;
  });
  return total>0?total:null;
}

function badgeCls(v){if(v==null)return'flat';return v>0?'up':v<0?'dn':'flat';}
function fmtPct(v){if(v==null)return'—';return(v>=0?'+':'')+v.toFixed(2)+'%';}
function fmtPrice(p){return p!=null?'$'+p.toFixed(2):'—';}

// ── CALENDAR ──
function moveMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  if(calYear<2025){calYear=2025;calMonth=0;}
  if(calYear>2030){calYear=2030;calMonth=11;}
  renderCalendar();
}
function renderCalendar(){
  const KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${KO[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const mm=String(calMonth+1).padStart(2,'0'),dd=String(day).padStart(2,'0');
    const ds=`${calYear}-${mm}-${dd}`;
    const dow=(firstDay+day-1)%7;
    const isToday=ds===TODAY,isSat=dow===6,isSun=dow===0;
    const isTrading=ALL_DATES.includes(ds);
    const hasData=isTrading&&SECTORS.some(sec=>sec.stocks.some(st=>getPrice(st.id,ds)!=null));
    let cls='cal-cell';
    if(isToday) cls+=' today';
    if(isSat) cls+=' weekend-sat';
    if(isSun) cls+=' weekend-sun';
    if(hasData) cls+=' has-data';
    if(selectedDate===ds) cls+=' selected';
    let tags='';
    if(hasData){
      tags='<div class="cal-sectors">';
      SECTORS.forEach(sec=>{
        const avg=sectorAvgChg(sec,ds);
        if(avg==null) return;
        tags+=`<div class="cal-sector-tag ${badgeCls(avg)}">${sec.short} ${avg>=0?'+':''}${avg.toFixed(1)}%</div>`;
      });
      tags+='</div>';
    }
    const oc=isTrading?`onclick="openDetail('${ds}')"`:''
    html+=`<div class="${cls}" ${oc}><div class="cal-day">${day}</div>${tags}</div>`;
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div class="cal-cell empty"></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

const CHART_COLORS=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function renderChartTabs(){
  // 첫 탭 = 섹터별, 나머지 = 개별 섹터
  const tabs=['섹터별',...SECTORS.map(s=>s.short)];
  document.getElementById('chartTabs').innerHTML=tabs.map(t=>
    `<button class="chart-tab ${t===selectedChartTab?'active':''}" onclick="selectChartTab('${t}')">${t}</button>`
  ).join('');
}
function selectChartTab(t){selectedChartTab=t;renderChartTabs();renderChart();}
function renderChart(){
  if(chartInstance){chartInstance.destroy();chartInstance=null;}

  // 실제 데이터 있는 날짜만 (오래된순)
  const allSorted=[...ALL_DATES].sort();
  const hasAnyData=d=>SECTORS.some(sec=>sec.stocks.some(st=>getPrice(st.id,d)!=null));
  const dates=allSorted.filter(hasAnyData);

  let datasets, yLabel;

  if(selectedChartTab==='섹터별'){
    // 달력과 동일: 섹터별 시총가중 전일대비 등락률
    datasets=SECTORS.map((sec,i)=>({
      label:sec.short,
      data:dates.map(d=>{
        // sectorAvgChg: 시총가중 전일대비 등락률
        const avg=sectorAvgChg(sec,d);
        return avg!=null?parseFloat(avg.toFixed(2)):null;
      }),
      borderColor:CHART_COLORS[i%CHART_COLORS.length],
      tension:.3,
      pointRadius:dates.length<=3?6:dates.length<=10?4:0,
      pointHoverRadius:5,
      fill:false,spanGaps:false,borderWidth:2,
    }));
    yLabel=v=>(v>=0?'+':'')+v+'%';

  } else {
    const sec=SECTORS.find(s=>s.short===selectedChartTab||s.name===selectedChartTab);
    if(!sec) return;
    const secDates=allSorted.filter(d=>sec.stocks.some(st=>getPrice(st.id,d)!=null));
    datasets=sec.stocks.map((st,i)=>({
      label:st.ticker,
      data:secDates.map(d=>getPrice(st.id,d)),
      borderColor:CHART_COLORS[i%CHART_COLORS.length],
      tension:.3,
      pointRadius:secDates.length<=3?6:secDates.length<=10?4:0,
      pointHoverRadius:5,fill:false,spanGaps:false,borderWidth:1.5,
    }));
    // 섹터별이 아닐 때 dates를 secDates로
    dates.splice(0,dates.length,...secDates);
    yLabel=v=>'$'+v;
  }

  // 데이터 없으면 안내 메시지
  if(dates.length===0){
    const ctx=document.getElementById('myChart').getContext('2d');
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle='#475569';
    ctx.font='14px DM Mono';
    ctx.textAlign='center';
    ctx.fillText('데이터가 없습니다',ctx.canvas.width/2,ctx.canvas.height/2);
    return;
  }

  chartInstance=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'line',
    data:{
      labels:dates.map(d=>d.slice(5).replace('-','/')),
      datasets,
    },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#94a3b8',font:{family:'DM Mono',size:10},boxWidth:12}},

          callbacks:{

              const v=ctx.parsed.y;
              if(v==null) return null;
              const s=selectedChartTab==='섹터별'?(v>=0?'+':'')+v.toFixed(2)+'%':'$'+v;
              return ` ${ctx.dataset.label}: ${s}`;

          }
        },
        // 0% 기준선 플러그인 (섹터별만)
        ...(selectedChartTab==='섹터별'?{
          annotation:{
            annotations:{
              zeroLine:{type:'line',yMin:0,yMax:0,borderColor:'rgba(255,255,255,.15)',borderWidth:1}
            }
          }
        }:{})
      },
      scales:{
        x:{ticks:{color:'#475569',font:{family:'DM Mono',size:9},maxTicksLimit:10},grid:{color:'#1c2a3e'}},
        y:{ticks:{color:'#475569',font:{family:'DM Mono',size:9},callback:yLabel},grid:{color:'#1c2a3e'}}
      }
    }
  });
}

let dcalYear=2026, dcalMonth=4;

function openDataCal(){
  const now=new Date();
  dcalYear=now.getFullYear(); dcalMonth=now.getMonth();
  document.getElementById('dataCalModal').classList.add('open');
  renderDcal();
}
function closeDataCal(){document.getElementById('dataCalModal').classList.remove('open');}
function moveDcalMonth(d){
  dcalMonth+=d;
  if(dcalMonth>11){dcalMonth=0;dcalYear++;}
  if(dcalMonth<0){dcalMonth=11;dcalYear--;}
  renderDcal();
}
function hasDataForDate(dateStr){
  // remotePrices 또는 prices에 해당 날짜 데이터가 하나라도 있으면 true
  const rp=remotePrices[dateStr], lp=prices[dateStr];
  return (rp&&Object.keys(rp).length>0)||(lp&&Object.keys(lp).length>0);
}
function renderDcal(){
  const KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('dcalMonthLabel').textContent=`${dcalYear}년 ${KO[dcalMonth]}`;
  const firstDay=new Date(dcalYear,dcalMonth,1).getDay();
  const daysInMonth=new Date(dcalYear,dcalMonth+1,0).getDate();
  let html='', savedCount=0;
  for(let i=0;i<firstDay;i++) html+=`<div class="dcal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const mm=String(dcalMonth+1).padStart(2,'0'), dd=String(day).padStart(2,'0');
    const ds=`${dcalYear}-${mm}-${dd}`;
    const dow=(firstDay+day-1)%7;
    const isToday=ds===TODAY, isSat=dow===6, isSun=dow===0;
    const hasData=hasDataForDate(ds);
    if(hasData) savedCount++;
    let cls='dcal-cell';
    if(isSun) cls+=' weekend-sun';
    if(isSat) cls+=' weekend-sat';
    if(isToday) cls+=' today-cell';
    if(hasData) cls+=' has-data';
    html+=`<div class="${cls}">
      <span class="dcal-day-num">${day}</span>
      ${hasData?'<span class="dcal-saved-label">저장됨</span>':''}
    </div>`;
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div class="dcal-cell empty"></div>`;
  document.getElementById('dcalGrid').innerHTML=html;
  // 이번달 통계
  const allSaved=new Set([...Object.keys(remotePrices),...Object.keys(prices)]);
  document.getElementById('dcalStat').textContent=
    `이번달 ${savedCount}일 저장 · 전체 ${allSaved.size}일 저장됨`;
}

// ── SYNC ──
async function onSync(){
  _cancel=false;
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');

  // STEP 1: GitHub data.json 최신 버전 다시 로드
  showLoad(true,'📡 서버 데이터 불러오는 중...','GitHub Actions 데이터 갱신');
  try{
    const r=await fetch('./data.json?t='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}});
    if(r.ok){
      remotePrices=await r.json();
      const dates=Object.keys(remotePrices).sort().reverse();
      if(dates[0]) document.getElementById('lastSyncDate').textContent=dates[0];
    }
  }catch(e){}

  // STEP 2: 오늘 Finnhub 현재가 갱신
  showLoad(true,'⚡ 오늘 현재가 갱신 중',TODAY);
  const allStocks=SECTORS.flatMap(s=>s.stocks);
  let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel)break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){
          if(!prices[TODAY]) prices[TODAY]={};
          prices[TODAY][st.id]=q.c;
          const pd=getPrevDate(TODAY);
          if(pd&&!getPrice(st.id,pd)){if(!prices[pd])prices[pd]={};prices[pd][st.id]=q.pc;}
        }
      }catch(e){}
      done++;updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length)await new Promise(r=>setTimeout(r,600));
  }

  save();showLoad(false);
  btn.classList.remove('spinning');
  document.getElementById('lastSyncDate').textContent=TODAY;
  renderAll();
  if(document.getElementById('detailSheet').classList.contains('open'))renderDetail();
  toast(`✅ 전체 갱신 완료 (누적 ${Object.keys({...prices,...remotePrices}).length}일)`);
}
async function onSyncDate(){
  if(!selectedDate)return onSync();
  _cancel=false;showLoad(true,'⚡ '+selectedDate+' 갱신 중','');
  const allStocks=SECTORS.flatMap(s=>s.stocks);let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel)break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){if(!prices[selectedDate])prices[selectedDate]={};prices[selectedDate][st.id]=q.c;}
      }catch(e){}
      done++;updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length)await new Promise(r=>setTimeout(r,600));
  }
  save();showLoad(false);renderCalendar();renderDetail();toast('✅ 갱신 완료');
}
function showLoad(show,title='',sub=''){
  document.getElementById('loadOverlay').classList.toggle('show',show);
  if(show){document.getElementById('loadTitle').textContent=title;document.getElementById('loadSub').textContent=sub;document.getElementById('loadBar').style.width='0%';}
}
function updateLoad(done,total,ticker=''){
  document.getElementById('loadBar').style.width=Math.round(done/total*100)+'%';
  document.getElementById('loadSub').textContent=`${done}/${total} · ${ticker}`;
}

// ── VIEW ──
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const vEl=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));
  if(vEl)vEl.classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  renderAll();
}
function renderAll(){
  if(currentView==='calendar') renderCalendar();
  else if(currentView==='table') renderTable();
  else if(currentView==='chart'){renderChartTabs();renderChart();}
  else if(currentView==='settings') renderSettings();
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── PASSWORD ──
const PW='8282';
let pwValue='';

function pwUpdateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    if(d) d.classList.toggle('filled',i<pwValue.length);
  }
}
function pwInput(n){
  if(pwValue.length>=4) return;
  pwValue+=n;
  pwUpdateDots();
  if(pwValue.length===4) setTimeout(pwCheck,100);
}
function pwDel(){
  if(!pwValue.length) return;
  pwValue=pwValue.slice(0,-1);
  pwUpdateDots();
  const e=document.getElementById('pwError');
  if(e) e.textContent='';
}
function pwCheck(){
  if(pwValue===PW){
    sessionStorage.setItem('st_auth','1');
    const pad=document.getElementById('pwPad');
    const loading=document.getElementById('pwLoading');
    if(pad) pad.style.display='none';
    if(loading) loading.style.display='flex';
    loadRemote(function(pct){
      const bar=document.getElementById('pwBar');
      const p=document.getElementById('pwPct');
      if(bar) bar.style.width=pct+'%';
      if(p) p.textContent=pct+'%';
    }).then(function(){
      const screen=document.getElementById('pwScreen');
      if(screen){
        screen.style.transition='opacity .4s';
        screen.style.opacity='0';
        setTimeout(function(){screen.style.display='none';renderAll();},400);
      }
    });
  } else {
    const e=document.getElementById('pwError');
    if(e) e.textContent='비밀번호가 틀렸습니다';
    try{if(navigator.vibrate)navigator.vibrate([100,50,100]);}catch(ex){}
    const dots=document.getElementById('pwDots');
    if(dots){dots.style.animation='none';dots.offsetHeight;dots.style.animation='shake .4s ease';}
    pwValue='';
    setTimeout(pwUpdateDots,400);
  }
}

// 비밀번호 패드 이벤트
window.addEventListener('load',function(){
  const pad=document.getElementById('pwPad');
  if(pad){
    pad.addEventListener('touchend',function(e){
      e.preventDefault();
      const btn=e.target.closest('[data-num]');
      if(btn) pwInput(btn.getAttribute('data-num'));
    });
    pad.addEventListener('click',function(e){
      const btn=e.target.closest('[data-num]');
      if(btn) pwInput(btn.getAttribute('data-num'));
    });
  }
  const del=document.getElementById('pwDelBtn');
  if(del){
    del.addEventListener('touchend',function(e){e.preventDefault();pwDel();});
    del.addEventListener('click',function(){pwDel();});
  }

  padding:8px 4px;border-bottom:1px solid rgba(28,42,62,.4);gap:6px}
.table-row:last-child{border-bottom:none}
.tr-l{display:flex;flex-direction:column;gap:2px;min-width:80px}
.tr-ticker{font-family:var(--mono);font-size:.78rem;font-weight:500}
.tr-name{font-size:.66rem;color:var(--text3)}
.tr-m{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.tr-cap-label{font-family:var(--mono);font-size:.54rem;color:var(--text3);letter-spacing:.3px}
.tr-cap{font-family:var(--mono);font-size:.74rem;font-weight:500;color:var(--text)}
.tr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px;min-width:72px}
.tr-price{font-family:var(--mono);font-size:.75rem;color:var(--text2)}
.divider{height:1px;background:var(--border);margin:0 14px 6px}

/* ── CHART VIEW ── */
.chart-section{padding:10px 14px}
.chart-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:8px;scrollbar-width:none;margin-bottom:4px}
.chart-tabs::-webkit-scrollbar{display:none}
.chart-tab{font-family:var(--mono);font-size:.66rem;padding:4px 11px;border-radius:14px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chart-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}

/* ── SETTINGS ── */
.settings-section{padding:14px}
.settings-title{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}
.sr-label{font-size:.8rem;color:var(--text)}
.sr-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.sr-action{font-family:var(--mono);font-size:.7rem;color:var(--accent);cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:rgba(8,11,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--text3);font-size:.58rem;font-family:var(--mono);
  border:none;background:none;padding-top:4px;transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:1.15rem;line-height:1}

/* LOADING */
#loadOverlay{position:fixed;inset:0;background:rgba(8,11,18,.9);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loadOverlay.show{display:flex}
.load-title{font-family:var(--mono);font-size:.82rem;color:var(--accent)}
.load-bar-bg{width:200px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.load-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.load-sub{font-family:var(--mono);font-size:.66rem;color:var(--text3)}
.load-cancel{font-family:var(--mono);font-size:.63rem;color:var(--text3);cursor:pointer;margin-top:4px;text-decoration:underline}

/* DATA CALENDAR MODAL */
#dataCalModal{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);
  z-index:300;display:none;align-items:flex-end;justify-content:center}
#dataCalModal.open{display:flex}
.dcal-sheet{background:var(--surface);border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-height:85vh;overflow-y:auto;padding:20px 16px;
  padding-bottom:calc(20px + var(--safe-bottom))}
.dcal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.dcal-title{font-family:var(--mono);font-size:.85rem;font-weight:500;color:var(--text)}
.dcal-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.dcal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dcal-month{font-family:var(--mono);font-size:.8rem;color:var(--text)}
.dcal-nav-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:.9rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.dcal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.dcal-dow-cell{text-align:center;font-family:var(--mono);font-size:.58rem;color:var(--text3);padding:3px 0}
.dcal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.dcal-cell{min-height:52px;border-radius:8px;padding:4px 2px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  background:var(--card);border:1px solid transparent}
.dcal-cell.empty{background:transparent;border-color:transparent}
.dcal-cell.has-data{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.2)}
.dcal-cell.today-cell{border-color:var(--accent)}
.dcal-day-num{font-family:var(--mono);font-size:.68rem;font-weight:500;color:var(--text2)}
.dcal-cell.weekend-sun .dcal-day-num{color:#ef4444}
.dcal-cell.weekend-sat .dcal-day-num{color:#3b82f6}
.dcal-cell.today-cell .dcal-day-num{color:var(--accent);font-weight:700}
.dcal-saved-label{font-family:var(--mono);font-size:.48rem;color:var(--green);
  background:var(--green-dim);padding:1px 4px;border-radius:4px;white-space:nowrap}
.dcal-stat{font-family:var(--mono);font-size:.65rem;color:var(--text3);
  margin-top:10px;text-align:center}

/* PASSWORD SCREEN */
#pwScreen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.pw-logo{font-family:var(--mono);font-size:1.4rem;font-weight:500;letter-spacing:-.5px}
.pw-logo em{color:var(--accent);font-style:normal}
.pw-label{font-family:var(--mono);font-size:.72rem;color:var(--text3);letter-spacing:.5px}
.pw-dots{display:flex;gap:12px;margin:4px 0}
.pw-dot{width:12px;height:12px;border-radius:50%;background:var(--border);transition:background .15s}
.pw-dot.filled{background:var(--accent)}
.pw-error{font-family:var(--mono);font-size:.68rem;color:var(--red);height:16px}
.pw-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px}
.pw-btn{height:68px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--text);font-family:var(--mono);font-size:1.3rem;font-weight:500;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;-webkit-user-select:none;user-select:none}
.pw-btn:active{background:var(--accent-dim);border-color:var(--accent);transform:scale(.95)}
.pw-btn .sub{font-size:.48rem;color:var(--text3);letter-spacing:.5px}
.pw-btn.del{color:var(--text2)}
.pw-btn.empty{border-color:transparent;background:transparent;cursor:default}
.pw-loading{display:none;flex-direction:column;align-items:center;gap:10px;width:240px}
.pw-load-title{font-family:var(--mono);font-size:.74rem;color:var(--accent)}
.pw-load-bar-bg{width:100%;height:6px;background:var(--border);border-radius:6px;overflow:hidden}
.pw-load-bar-fill{height:100%;background:var(--accent);border-radius:6px;width:0%;transition:width .3s}
.pw-load-pct{font-family:var(--mono);font-size:.68rem;color:var(--text2)}
.pw-load-hint{font-family:var(--mono);font-size:.64rem;color:var(--text3);text-align:center;line-height:1.6}

/* TOAST */
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}
  60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}
}
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);
  left:50%;transform:translateX(-50%) translateY(18px);
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:.72rem;padding:8px 16px;border-radius:18px;
  opacity:0;transition:all .25s;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

// ET 기준 오늘 날짜 (UTC-4 서머타임)
const ET_OFFSET = -4 * 60;

// ── PERSIST ──
// localStorage는 오늘 현재가(prices)만 저장, 나머지는 data.json 의존
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    // 오늘 날짜 데이터만 복원 (다른 날은 data.json에서)
    if(s.todayPrices) prices[TODAY]=s.todayPrices;
    if(s.detailPeriodDays) detailPeriodDays=s.detailPeriodDays;
    if(s.tableBaseDate) tableBaseDate=s.tableBaseDate;
    if(s.tableCompareDate) tableCompareDate=s.tableCompareDate;
  }catch(e){}
  // 기본값: 시작=1개월전, 종료=오늘
  if(!tableBaseDate){
    const idx=ALL_DATES.indexOf(TODAY);
    tableBaseDate=idx>=21?ALL_DATES[idx+21]:ALL_DATES[ALL_DATES.length-1];
  }
  if(!tableCompareDate) tableCompareDate=TODAY;
}
function save(){
  // 오늘 데이터만 localStorage에 저장
  localStorage.setItem(STORAGE_KEY,JSON.stringify({
    todayPrices: prices[TODAY]||{},
    detailPeriodDays, tableBaseDate, tableCompareDate
  }));
}

// ── REMOTE ──
async function loadRemote(){
  try{
    const r=await fetch('./data.json?t='+Date.now(),{
      cache:'no-store',
      headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}
    });
    if(r.ok){
      remotePrices=await r.json();
      const dates=Object.keys(remotePrices).sort().reverse();
      if(dates[0]) document.getElementById('lastSyncDate').textContent=dates[0];
    }
  }catch(e){ console.warn('data.json 로드 실패:', e); }

  // profile.json 로드 (발행주식수)
  try{
    const r=await fetch('./profile.json?t='+Date.now(),{cache:'no-store'});
    if(r.ok) profileData=await r.json();
  }catch(e){ console.warn('profile.json 로드 실패:', e); }

  // 환율 로드 (Finnhub forex)
  await fetchExchangeRate();
}

async function fetchExchangeRate(){
  try{
    const r=await fetch(`https://finnhub.io/api/v1/forex/rates?base=USD&token=${FINNHUB_KEY}`);
    const d=await r.json();
    const krw=d?.quote?.KRW;
    if(krw && krw>0){
      exchangeRate=krw;
      document.getElementById('exchangeRateDisplay').textContent=
        Math.round(krw).toLocaleString()+'원';
    }
  }catch(e){
    document.getElementById('exchangeRateDisplay').textContent='1,380원';
  }
}

// ── PRICE HELPERS ──
function getPrice(sid,date){return prices[date]?.[sid]??remotePrices[date]?.[sid]??null;}
function getPrevDate(date){const i=ALL_DATES.indexOf(date);return(i>=0&&i<ALL_DATES.length-1)?ALL_DATES[i+1]:null;}
function getNDaysAgo(date,n){
  const i=ALL_DATES.indexOf(date);
  return(i>=0)?ALL_DATES[Math.min(i+n,ALL_DATES.length-1)]:null;
}
function getYTDStart(date){
  const yr=date.slice(0,4);
  return[...ALL_DATES].reverse().find(d=>d.startsWith(yr))||null;
}
function getChgBetween(sid,dateA,dateB){
  // A=최근, B=과거. A 기준 대비 B
  const cur=getPrice(sid,dateA),base=getPrice(sid,dateB);
  if(cur==null||base==null||base===0) return null;
  return{pct:(cur-base)/base*100,abs:cur-base};
}
function getChg(sid,date){return getChgBetween(sid,date,getPrevDate(date));}

// 시가총액 USD (빌리언)
function getMarketCapUSD(sid, price){
  if(price==null) return null;
  const prof=profileData[sid];
  if(!prof||!prof.shares||prof.shares===0) return null;
  // shares는 백만주 단위 → USD 빌리언 = price * shares / 1000
  return price * prof.shares / 1000;
}
// 시가총액 KRW (억 단위)
function getMarketCapKRW(sid, price){
  const usdB=getMarketCapUSD(sid,price);
  if(usdB==null) return null;
  return Math.round(usdB * 1000 * 1_000_000 * exchangeRate / 1_0000_0000);
}
function fmtCapUSD(b){
  if(b==null) return '—';
  if(b>=1000) return (b/1000).toFixed(1)+'T';
  return b.toFixed(1)+'B';
}
function fmtCapKRW(억){
  if(억==null) return '—';
  if(억>=10000) return (억/10000).toFixed(1)+'조';
  return Math.round(억).toLocaleString()+'억';
}
function getPeriodChgDetail(sid,date){
  const pd=getNDaysAgo(date,detailPeriodDays);
  return getChgBetween(sid,date,pd);
}
// 테이블용: baseDate 대비 compareDate
function getTableChg(sid){return getChgBetween(sid,tableBaseDate,tableCompareDate);}

function sectorAvgChg(sec,date){
  // 시가총액 가중평균 (전일대비)
  let ws=0,tc=0;
  sec.stocks.forEach(st=>{
    const chg=getChg(st.id,date);
    const cap=getMarketCapUSD(st.id,getPrice(st.id,date));
    if(chg!=null&&cap!=null&&cap>0){ws+=chg.pct*cap;tc+=cap;}
  });
  return tc>0?ws/tc:null;
}
// 섹터 평균: 특정 두 날짜 사이
function sectorAvgBetween(sec,dA,dB){
  // 시가총액 가중평균
  let weightedSum=0, totalCap=0;
  sec.stocks.forEach(st=>{
    const chg=getChgBetween(st.id,dA,dB);
    const price=getPrice(st.id,dA);
    const cap=getMarketCapUSD(st.id,price);
    if(chg!=null && cap!=null && cap>0){
      weightedSum+=chg.pct*cap;
      totalCap+=cap;
    }
  });
  return totalCap>0?weightedSum/totalCap:null;
}
// 섹터 합산 시총 (USD 빌리언)
function sectorTotalCapB(sec,date){
  let total=0;
  sec.stocks.forEach(st=>{
    const cap=getMarketCapUSD(st.id,getPrice(st.id,date));
    if(cap!=null) total+=cap;
  });
  return total>0?total:null;
}

function badgeCls(v){if(v==null)return'flat';return v>0?'up':v<0?'dn':'flat';}
function fmtPct(v){if(v==null)return'—';return(v>=0?'+':'')+v.toFixed(2)+'%';}
function fmtPrice(p){return p!=null?'$'+p.toFixed(2):'—';}

// ── CALENDAR ──
function moveMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  if(calYear<2025){calYear=2025;calMonth=0;}
  if(calYear>2030){calYear=2030;calMonth=11;}
  renderCalendar();
}
function renderCalendar(){
  const KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${KO[calMonth]}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const mm=String(calMonth+1).padStart(2,'0'),dd=String(day).padStart(2,'0');
    const ds=`${calYear}-${mm}-${dd}`;
    const dow=(firstDay+day-1)%7;
    const isToday=ds===TODAY,isSat=dow===6,isSun=dow===0;
    const isTrading=ALL_DATES.includes(ds);
    const hasData=isTrading&&SECTORS.some(sec=>sec.stocks.some(st=>getPrice(st.id,ds)!=null));
    let cls='cal-cell';
    if(isToday) cls+=' today';
    if(isSat) cls+=' weekend-sat';
    if(isSun) cls+=' weekend-sun';
    if(hasData) cls+=' has-data';
    if(selectedDate===ds) cls+=' selected';
    let tags='';
    if(hasData){
      tags='<div class="cal-sectors">';
      SECTORS.forEach(sec=>{
        const avg=sectorAvgChg(sec,ds);
        if(avg==null) return;
        tags+=`<div class="cal-sector-tag ${badgeCls(avg)}">${sec.short} ${avg>=0?'+':''}${avg.toFixed(1)}%</div>`;
      });
      tags+='</div>';
    }
    const oc=isTrading?`onclick="openDetail('${ds}')"`:''
    html+=`<div class="${cls}" ${oc}><div class="cal-day">${day}</div>${tags}</div>`;
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div class="cal-cell empty"></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

    const avg=sectorAvgChg(sec,d);
    const pavg=sectorAvgBetween(sec,d,pd);
    const sorted=[...sec.stocks].sort((a,b)=>{
      const ca=getChg(a.id,d),cb=getChg(b.id,d);
      if(!ca&&!cb)return 0;if(!ca)return 1;if(!cb)return -1;return cb.pct-ca.pct;
    });
    html+=`<div class="detail-sector">
      <div class="detail-sector-head">
        <span class="detail-sector-name">${sec.name}</span>

          <span class="badge-lbl">기간</span><span class="badge ${badgeCls(pavg)}">${fmtPct(pavg)}</span>
        </div>
      </div>`;
    sorted.forEach(st=>{
      const p=getPrice(st.id,d),chg=getChg(st.id,d),pchg=getPeriodChgDetail(st.id,d);
      html+=`<div class="detail-stock">
        <div class="ds-l"><span class="ds-ticker">${st.ticker}</span><span class="ds-name">${st.name}</span></div>
        <div class="ds-r">
          <span class="ds-price">${fmtPrice(p)}</span>
          <div class="chg-row">
            <span class="mbadge ${badgeCls(chg?chg.pct:null)}">${fmtPct(chg?chg.pct:null)}</span>
            <span class="mbadge sec ${badgeCls(pchg?pchg.pct:null)}">${fmtPct(pchg?pchg.pct:null)}</span>
          </div>

  document.getElementById('detailContent').innerHTML=html;
}

function setQuickRange(n){

  if(n==='ytd') start=getYTDStart(TODAY)||TODAY;

function renderTable(){
  document.getElementById('tableBaseDateInput').value=tableBaseDate;
  document.getElementById('tableCompareDateInput').value=tableCompareDate;

      const ca=getChgBetween(a.id,dA,dB),cb=getChgBetween(b.id,dA,dB);
      if(!ca&&!cb)return 0;if(!ca)return 1;if(!cb)return -1;return cb.pct-ca.pct;
    });
    html+=`<div class="table-section">
      <div class="table-section-title" style="display:flex;justify-content:space-between;align-items:flex-start">

          <span class="mbadge ${badgeCls(chg?chg.pct:null)}">${fmtPct(chg?chg.pct:null)}</span>
        </div>
      </div>`;
    });

}

// ── CHART ──
const CHART_COLORS=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];

function renderChartTabs(){
  // 첫 탭 = 섹터별, 나머지 = 개별 섹터
  const tabs=['섹터별',...SECTORS.map(s=>s.short)];
  document.getElementById('chartTabs').innerHTML=tabs.map(t=>
    `<button class="chart-tab ${t===selectedChartTab?'active':''}" onclick="selectChartTab('${t}')">${t}</button>`
  ).join('');
}
function selectChartTab(t){selectedChartTab=t;renderChartTabs();renderChart();}
function renderChart(){
  if(chartInstance){chartInstance.destroy();chartInstance=null;}

  // 실제 데이터 있는 날짜만 (오래된순)
  const allSorted=[...ALL_DATES].sort();
  const hasAnyData=d=>SECTORS.some(sec=>sec.stocks.some(st=>getPrice(st.id,d)!=null));
  const dates=allSorted.filter(hasAnyData);

  let datasets, yLabel;

  if(selectedChartTab==='섹터별'){
    // 달력과 동일: 섹터별 시총가중 전일대비 등락률
    datasets=SECTORS.map((sec,i)=>({
      label:sec.short,
      data:dates.map(d=>{
        // sectorAvgChg: 시총가중 전일대비 등락률
        const avg=sectorAvgChg(sec,d);
        return avg!=null?parseFloat(avg.toFixed(2)):null;
      }),
      borderColor:CHART_COLORS[i%CHART_COLORS.length],
      tension:.3,
      pointRadius:dates.length<=3?6:dates.length<=10?4:0,
      pointHoverRadius:5,
      fill:false,spanGaps:false,borderWidth:2,
    }));
    yLabel=v=>(v>=0?'+':'')+v+'%';

  } else {
    const sec=SECTORS.find(s=>s.short===selectedChartTab||s.name===selectedChartTab);
    if(!sec) return;
    const secDates=allSorted.filter(d=>sec.stocks.some(st=>getPrice(st.id,d)!=null));
    datasets=sec.stocks.map((st,i)=>({
      label:st.ticker,
      data:secDates.map(d=>getPrice(st.id,d)),
      borderColor:CHART_COLORS[i%CHART_COLORS.length],
      tension:.3,
      pointRadius:secDates.length<=3?6:secDates.length<=10?4:0,
      pointHoverRadius:5,fill:false,spanGaps:false,borderWidth:1.5,
    }));
    // 섹터별이 아닐 때 dates를 secDates로
    dates.splice(0,dates.length,...secDates);
    yLabel=v=>'$'+v;
  }

  // 데이터 없으면 안내 메시지
  if(dates.length===0){
    const ctx=document.getElementById('myChart').getContext('2d');
    ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
    ctx.fillStyle='#475569';
    ctx.font='14px DM Mono';
    ctx.textAlign='center';
    ctx.fillText('데이터가 없습니다',ctx.canvas.width/2,ctx.canvas.height/2);
    return;
  }

  chartInstance=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'line',
    data:{
      labels:dates.map(d=>d.slice(5).replace('-','/')),
      datasets,
    },
    options:{
      responsive:true,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{labels:{color:'#94a3b8',font:{family:'DM Mono',size:10},boxWidth:12}},
        tooltip:{
          backgroundColor:'#0f1520',titleColor:'#3b82f6',
          bodyColor:'#f1f5f9',borderColor:'#1c2a3e',borderWidth:1,
          callbacks:{
            label:ctx=>{
              const v=ctx.parsed.y;
              if(v==null) return null;
              const s=selectedChartTab==='섹터별'?(v>=0?'+':'')+v.toFixed(2)+'%':'$'+v;
              return ` ${ctx.dataset.label}: ${s}`;
            }
          }
        },
        // 0% 기준선 플러그인 (섹터별만)
        ...(selectedChartTab==='섹터별'?{
          annotation:{
            annotations:{
              zeroLine:{type:'line',yMin:0,yMax:0,borderColor:'rgba(255,255,255,.15)',borderWidth:1}
            }
          }
        }:{})
      },
      scales:{
        x:{ticks:{color:'#475569',font:{family:'DM Mono',size:9},maxTicksLimit:10},grid:{color:'#1c2a3e'}},
        y:{ticks:{color:'#475569',font:{family:'DM Mono',size:9},callback:yLabel},grid:{color:'#1c2a3e'}}
      }
    }
  });
}

let dcalYear=2026, dcalMonth=4;

function openDataCal(){
  const now=new Date();
  dcalYear=now.getFullYear(); dcalMonth=now.getMonth();
  document.getElementById('dataCalModal').classList.add('open');
  renderDcal();
}
function closeDataCal(){document.getElementById('dataCalModal').classList.remove('open');}
function moveDcalMonth(d){
  dcalMonth+=d;
  if(dcalMonth>11){dcalMonth=0;dcalYear++;}
  if(dcalMonth<0){dcalMonth=11;dcalYear--;}
  renderDcal();
}
function hasDataForDate(dateStr){
  // remotePrices 또는 prices에 해당 날짜 데이터가 하나라도 있으면 true
  const rp=remotePrices[dateStr], lp=prices[dateStr];
  return (rp&&Object.keys(rp).length>0)||(lp&&Object.keys(lp).length>0);
}
function renderDcal(){
  const KO=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('dcalMonthLabel').textContent=`${dcalYear}년 ${KO[dcalMonth]}`;
  const firstDay=new Date(dcalYear,dcalMonth,1).getDay();
  const daysInMonth=new Date(dcalYear,dcalMonth+1,0).getDate();
  let html='', savedCount=0;
  for(let i=0;i<firstDay;i++) html+=`<div class="dcal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const mm=String(dcalMonth+1).padStart(2,'0'), dd=String(day).padStart(2,'0');
    const ds=`${dcalYear}-${mm}-${dd}`;
    const dow=(firstDay+day-1)%7;
    const isToday=ds===TODAY, isSat=dow===6, isSun=dow===0;
    const hasData=hasDataForDate(ds);
    if(hasData) savedCount++;
    let cls='dcal-cell';
    if(isSun) cls+=' weekend-sun';
    if(isSat) cls+=' weekend-sat';
    if(isToday) cls+=' today-cell';
    if(hasData) cls+=' has-data';
    html+=`<div class="${cls}">
      <span class="dcal-day-num">${day}</span>
      ${hasData?'<span class="dcal-saved-label">저장됨</span>':''}
    </div>`;
  }
  const rem=(firstDay+daysInMonth)%7;
  if(rem>0) for(let i=0;i<7-rem;i++) html+=`<div class="dcal-cell empty"></div>`;
  document.getElementById('dcalGrid').innerHTML=html;
  // 이번달 통계
  const allSaved=new Set([...Object.keys(remotePrices),...Object.keys(prices)]);
  document.getElementById('dcalStat').textContent=
    `이번달 ${savedCount}일 저장 · 전체 ${allSaved.size}일 저장됨`;
}

// ── SYNC ──
async function onSync(){
  _cancel=false;
  const btn=document.getElementById('syncBtn');
  btn.classList.add('spinning');

  // STEP 1: GitHub data.json 최신 버전 다시 로드
  showLoad(true,'📡 서버 데이터 불러오는 중...','GitHub Actions 데이터 갱신');
  try{
    const r=await fetch('./data.json?t='+Date.now(),{cache:'no-store',headers:{'Cache-Control':'no-cache, no-store, must-revalidate','Pragma':'no-cache'}});
    if(r.ok){
      remotePrices=await r.json();
      const dates=Object.keys(remotePrices).sort().reverse();
      if(dates[0]) document.getElementById('lastSyncDate').textContent=dates[0];
    }
  }catch(e){}

  // STEP 2: 오늘 Finnhub 현재가 갱신
  showLoad(true,'⚡ 오늘 현재가 갱신 중',TODAY);
  const allStocks=SECTORS.flatMap(s=>s.stocks);
  let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel)break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){
          if(!prices[TODAY]) prices[TODAY]={};
          prices[TODAY][st.id]=q.c;
          const pd=getPrevDate(TODAY);
          if(pd&&!getPrice(st.id,pd)){if(!prices[pd])prices[pd]={};prices[pd][st.id]=q.pc;}
        }
      }catch(e){}
      done++;updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length)await new Promise(r=>setTimeout(r,600));
  }

  save();showLoad(false);
  btn.classList.remove('spinning');
  document.getElementById('lastSyncDate').textContent=TODAY;
  renderAll();
  if(document.getElementById('detailSheet').classList.contains('open'))renderDetail();
  toast(`✅ 전체 갱신 완료 (누적 ${Object.keys({...prices,...remotePrices}).length}일)`);
}
async function onSyncDate(){
  if(!selectedDate)return onSync();
  _cancel=false;showLoad(true,'⚡ '+selectedDate+' 갱신 중','');
  const allStocks=SECTORS.flatMap(s=>s.stocks);let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel)break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){if(!prices[selectedDate])prices[selectedDate]={};prices[selectedDate][st.id]=q.c;}
      }catch(e){}
      done++;updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length)await new Promise(r=>setTimeout(r,600));
  }
  save();showLoad(false);renderCalendar();renderDetail();toast('✅ 갱신 완료');
}
function showLoad(show,title='',sub=''){
  document.getElementById('loadOverlay').classList.toggle('show',show);
  if(show){document.getElementById('loadTitle').textContent=title;document.getElementById('loadSub').textContent=sub;document.getElementById('loadBar').style.width='0%';}
}
function updateLoad(done,total,ticker=''){
  document.getElementById('loadBar').style.width=Math.round(done/total*100)+'%';
  document.getElementById('loadSub').textContent=`${done}/${total} · ${ticker}`;
}

// ── VIEW ──
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const vEl=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));
  if(vEl)vEl.classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  renderAll();
}
function renderAll(){
  if(currentView==='calendar') renderCalendar();
  else if(currentView==='table') renderTable();
  else if(currentView==='chart'){renderChartTabs();renderChart();}
  else if(currentView==='settings') renderSettings();
}
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

// ── PASSWORD ──
const PW = '8282';
let pwValue = '';

function pwInput(n){
  if(pwValue.length>=4) return;
  pwValue+=n;
  updateDots();
  if(pwValue.length===4) setTimeout(checkPw,80);
}
function pwDelete(){
  pwValue=pwValue.slice(0,-1);
  updateDots();
  document.getElementById('pwError').textContent='';
}
function updateDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled', i<pwValue.length);
  }
}
function checkPw(){
  if(pwValue===PW){
    const el=document.getElementById('pwScreen');
    el.style.transition='opacity .3s';
    el.style.opacity='0';
    setTimeout(()=>el.style.display='none',300);
    sessionStorage.setItem('st_auth','1');
  } else {
    document.getElementById('pwError').textContent='비밀번호가 틀렸습니다';
    // 진동
    if(navigator.vibrate) navigator.vibrate([100,50,100]);
    // 흔들기
    const dots=document.getElementById('pwDots');
    dots.style.animation='none';
    dots.offsetHeight;
    dots.style.animation='shake .4s ease';
    pwValue='';
    setTimeout(()=>updateDots(),400);
  }
}
