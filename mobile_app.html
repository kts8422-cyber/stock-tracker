<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SectorTrack">
<meta name="theme-color" content="#0a0e17">
<title>SectorTrack</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b12;
  --surface: #0f1520;
  --card: #131c2e;
  --border: #1c2a3e;
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,.12);
  --amber: #f59e0b;
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --nav-h: 64px;
  --header-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overscroll-behavior: none;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100dvh; }

/* ── HEADER ── */
.app-header {
  height: var(--header-h);
  background: rgba(8,11,18,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  padding-top: env(safe-area-inset-top, 0px);
  position: sticky; top: 0; z-index: 50;
}
.app-logo {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: -.5px;
  color: var(--text);
}
.app-logo em { color: var(--accent); font-style: normal; }
.header-right { display: flex; align-items: center; gap: 10px; }
.sync-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.sync-btn:active { transform: scale(.93); background: var(--accent-dim); color: var(--accent); }
.sync-btn.spinning { animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-sync { font-family: var(--mono); font-size: .62rem; color: var(--text3); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px);
}

/* ── PERIOD TABS ── */
.period-tabs {
  display: flex;
  gap: 6px;
  padding: 12px 16px 10px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  flex-shrink: 0;
}
.period-tabs::-webkit-scrollbar { display: none; }
.period-tab {
  font-family: var(--mono);
  font-size: .7rem;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  white-space: nowrap;
  transition: all .18s;
  flex-shrink: 0;
}
.period-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  font-weight: 500;
}

/* ── SUMMARY ROW ── */
.summary-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  padding: 0 16px 12px;
}
.sum-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
}
.sum-label { font-family: var(--mono); font-size: .58rem; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 4px; }
.sum-val { font-family: var(--mono); font-size: .88rem; font-weight: 500; }
.sum-val.up { color: var(--green); }
.sum-val.dn { color: var(--red); }

/* ── SECTOR CARDS ── */
.sectors-list { display: flex; flex-direction: column; gap: 10px; padding: 0 16px; }

.sector-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  transition: transform .15s;
}
.sector-card:active { transform: scale(.99); }

.sector-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
}
.sector-name {
  font-size: .78rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .3px;
}
.sector-badges { display: flex; gap: 5px; align-items: center; }
.badge {
  font-family: var(--mono);
  font-size: .68rem;
  font-weight: 500;
  padding: 3px 8px;
  border-radius: 8px;
}
.badge-label { font-size: .55rem; color: var(--text3); font-family: var(--mono); }
.badge.up { background: var(--green-dim); color: var(--green); }
.badge.dn { background: var(--red-dim); color: var(--red); }
.badge.flat { background: rgba(71,85,105,.15); color: var(--text3); }

.sector-stocks { padding: 4px 0; }
.stock-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(28,42,62,.6);
  transition: background .12s;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:active { background: rgba(255,255,255,.03); }
.stock-left { display: flex; flex-direction: column; gap: 2px; }
.stock-ticker { font-family: var(--mono); font-size: .8rem; font-weight: 500; color: var(--text); }
.stock-name { font-size: .68rem; color: var(--text3); }
.stock-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.stock-price { font-family: var(--mono); font-size: .78rem; color: var(--text2); }
.chg-row { display: flex; gap: 4px; }

/* mini badge */
.mbadge {
  font-family: var(--mono);
  font-size: .62rem;
  font-weight: 500;
  padding: 2px 6px;
  border-radius: 6px;
}
.mbadge.up { background: var(--green-dim); color: var(--green); }
.mbadge.dn { background: var(--red-dim); color: var(--red); }
.mbadge.flat { background: rgba(71,85,105,.15); color: var(--text3); }
.mbadge.period { opacity: .7; }

/* ── BOTTOM NAV ── */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom: var(--safe-bottom);
  background: rgba(8,11,18,.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 50;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text3);
  font-size: .6rem;
  font-family: var(--mono);
  transition: color .18s;
  border: none;
  background: none;
  padding-top: 4px;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 1.2rem; line-height: 1; }

/* ── VIEWS ── */
.view { display: none; }
.view.active { display: block; }

/* ── TABLE VIEW ── */
.table-section { padding: 0 16px; }
.table-section-title {
  font-family: var(--mono);
  font-size: .65rem;
  color: var(--text3);
  letter-spacing: .8px;
  text-transform: uppercase;
  padding: 10px 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.table-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 9px 4px;
  border-bottom: 1px solid rgba(28,42,62,.5);
}
.table-row:last-child { border-bottom: none; }
.tr-left { display: flex; flex-direction: column; gap: 2px; }
.tr-ticker { font-family: var(--mono); font-size: .8rem; font-weight: 500; }
.tr-name { font-size: .67rem; color: var(--text3); }
.tr-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.tr-price { font-family: var(--mono); font-size: .78rem; color: var(--text2); }

/* ── CHART VIEW ── */
.chart-section { padding: 12px 16px; }
.chart-picker { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
.chart-picker::-webkit-scrollbar { display: none; }
.chart-pick-btn {
  font-family: var(--mono); font-size: .68rem;
  padding: 4px 10px; border-radius: 14px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text3); cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: all .15s;
}
.chart-pick-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.chart-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }

/* ── SETTINGS VIEW ── */
.settings-section { padding: 16px; }
.settings-title { font-family: var(--mono); font-size: .65rem; color: var(--text3); letter-spacing: .8px; text-transform: uppercase; margin-bottom: 10px; }
.setting-row {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 13px 14px; margin-bottom: 8px;
}
.setting-row-label { font-size: .82rem; color: var(--text); }
.setting-row-sub { font-size: .7rem; color: var(--text3); margin-top: 2px; }
.setting-action { font-family: var(--mono); font-size: .72rem; color: var(--accent); cursor: pointer; }

/* ── LOADING OVERLAY ── */
#loadOverlay {
  position: fixed; inset: 0;
  background: rgba(8,11,18,.9);
  backdrop-filter: blur(8px);
  z-index: 200;
  display: none; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px;
}
#loadOverlay.show { display: flex; }
.load-title { font-family: var(--mono); font-size: .85rem; color: var(--accent); }
.load-bar-bg { width: 220px; height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.load-bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width .3s; }
.load-sub { font-family: var(--mono); font-size: .68rem; color: var(--text3); }
.load-cancel { font-family: var(--mono); font-size: .65rem; color: var(--text3); cursor: pointer; margin-top: 4px; text-decoration: underline; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px);
  left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--card); border: 1px solid var(--border);
  color: var(--text); font-family: var(--mono); font-size: .74rem;
  padding: 9px 18px; border-radius: 20px;
  opacity: 0; transition: all .25s; z-index: 100; white-space: nowrap;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text3); font-family: var(--mono); font-size: .78rem; }
.empty-icon { font-size: 2rem; margin-bottom: 10px; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 0 16px 10px; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-logo">SECTOR<em>TRACK</em></div>
    <div class="header-right">
      <span class="last-sync" id="lastSync">—</span>
      <button class="sync-btn" id="syncBtn" onclick="onSync()" title="현재가 갱신">↻</button>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scrollArea">

    <!-- VIEW: 섹터 (홈) -->
    <div class="view active" id="viewSector">
      <div class="period-tabs" id="periodTabs"></div>
      <div class="summary-row" id="summaryRow"></div>
      <div class="sectors-list" id="sectorsList"></div>
      <div style="height:8px"></div>
    </div>

    <!-- VIEW: 종목 테이블 -->
    <div class="view" id="viewTable">
      <div class="period-tabs" id="periodTabs2"></div>
      <div id="tableContent"></div>
    </div>

    <!-- VIEW: 차트 -->
    <div class="view" id="viewChart">
      <div class="chart-section">
        <div class="chart-picker" id="chartPicker"></div>
        <div class="chart-wrap"><canvas id="myChart" height="300"></canvas></div>
      </div>
    </div>

    <!-- VIEW: 설정 -->
    <div class="view" id="viewSettings">
      <div class="settings-section">
        <div class="settings-title">데이터</div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">현재가 갱신</div>
            <div class="setting-row-sub">Finnhub API · 오늘 날짜 기준</div>
          </div>
          <span class="setting-action" onclick="onSync()">실행 →</span>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">선택 날짜</div>
            <div class="setting-row-sub" id="selectedDateLabel">—</div>
          </div>
          <input type="date" id="datePickerSettings" onchange="onDateChange(this.value)"
            style="background:transparent;border:none;color:var(--accent);font-family:var(--mono);font-size:.75rem;cursor:pointer;outline:none">
        </div>
        <div style="height:16px"></div>
        <div class="settings-title">앱 정보</div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">저장된 날짜</div>
            <div class="setting-row-sub" id="storedDatesLabel">0일</div>
          </div>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-row-label">총 종목 수</div>
            <div class="setting-row-sub">50개 · 10개 섹터</div>
          </div>
        </div>
        <div class="setting-row" style="cursor:pointer" onclick="clearData()">
          <div>
            <div class="setting-row-label" style="color:var(--red)">데이터 초기화</div>
            <div class="setting-row-sub">저장된 가격 데이터 전체 삭제</div>
          </div>
          <span style="color:var(--red);font-size:1rem">→</span>
        </div>
      </div>
    </div>

  </div><!-- /scroll-area -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-sector" onclick="switchView('sector')">
      <span class="nav-icon">⬡</span><span>섹터</span>
    </button>
    <button class="nav-item" id="nav-table" onclick="switchView('table')">
      <span class="nav-icon">≡</span><span>종목</span>
    </button>
    <button class="nav-item" id="nav-chart" onclick="switchView('chart')">
      <span class="nav-icon">◈</span><span>차트</span>
    </button>
    <button class="nav-item" id="nav-settings" onclick="switchView('settings')">
      <span class="nav-icon">◎</span><span>설정</span>
    </button>
  </nav>
</div>

<!-- LOADING -->
<div id="loadOverlay">
  <div class="load-title" id="loadTitle">데이터 불러오는 중...</div>
  <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar" style="width:0%"></div></div>
  <div class="load-sub" id="loadSub">0 / 0</div>
  <div class="load-cancel" onclick="cancelFetch()">취소</div>
</div>

<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

function load() {

}

  localStorage.setItem(STORAGE_KEY, JSON.stringify({ prices, selectedDate, periodDays }));
}

// ── REMOTE DATA ──
async function loadRemote() {
  try {
    const r = await fetch('./data.json?t='+Date.now());
    if (r.ok) {
      remotePrices = await r.json();
      const dates = Object.keys(remotePrices).sort().reverse();
      if (dates[0]) document.getElementById('lastSync').textContent = dates[0].slice(5);
    }
  } catch(e) {}
}

// ── PRICE HELPERS ──
function getPrice(sid, date) {
  return prices[date]?.[sid] ?? remotePrices[date]?.[sid] ?? null;
}
function getPrevDate(date) {
  const i = ALL_DATES.indexOf(date);
  return (i >= 0 && i < ALL_DATES.length-1) ? ALL_DATES[i+1] : null;
}
function getPeriodDate(date, days) {
  const i = ALL_DATES.indexOf(date);
  if (i < 0) return null;
  if (days === 'all') return ALL_DATES[ALL_DATES.length-1];
  if (days === 'ytd') {
    const yr = date.slice(0,4);
    return [...ALL_DATES].reverse().find(d=>d.startsWith(yr)) || null;
  }
  return ALL_DATES[Math.min(i+days, ALL_DATES.length-1)];
}
function getChg(sid, date) {
  const cur = getPrice(sid, date);
  const prev = getPrice(sid, getPrevDate(date));
  if (cur==null||prev==null||prev===0) return null;
  return { pct:(cur-prev)/prev*100, abs:cur-prev };
}
function getPeriodChg(sid, date) {
  const cur = getPrice(sid, date);
  const pd = getPeriodDate(date, periodDays);
  if (!pd||pd===date) return null;
  const base = getPrice(sid, pd);
  if (cur==null||base==null||base===0) return null;
  return { pct:(cur-base)/base*100, abs:cur-base };
}

function badgeCls(chg) {
  if (!chg) return 'flat';
  return chg.pct > 0 ? 'up' : chg.pct < 0 ? 'dn' : 'flat';
}
function fmtPct(chg) {
  if (!chg) return '—';
  const s = chg.pct >= 0 ? '+' : '';
  return s + chg.pct.toFixed(2) + '%';
}
function fmtPrice(p) { return p != null ? '$' + p.toFixed(2) : '—'; }

// ── SUMMARY ──
function renderSummary() {
  const d = selectedDate;
  let up=0, dn=0, pSum=0, pN=0;
  SECTORS.forEach(sec => sec.stocks.forEach(st => {
    const c = getChg(st.id, d);
    if (c) { up += c.pct>0?1:0; dn += c.pct<0?1:0; }
    const pc = getPeriodChg(st.id, d);
    if (pc) { pSum += pc.pct; pN++; }
  }));
  const avg = pN ? pSum/pN : null;
  const pl = PERIODS.find(p=>p.days===periodDays)?.label || '기간';
  document.getElementById('summaryRow').innerHTML = `
    <div class="sum-card">
      <div class="sum-label">상승</div>
      <div class="sum-val up">▲ ${up}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">하락</div>
      <div class="sum-val dn">▼ ${dn}</div>
    </div>
    <div class="sum-card">
      <div class="sum-label">${pl} 평균</div>
      <div class="sum-val ${avg==null?'':avg>=0?'up':'dn'}">${avg==null?'—':(avg>=0?'+':'')+avg.toFixed(1)+'%'}</div>
    </div>`;
}

// ── SECTOR CARDS ──
function renderSectors() {
  const d = selectedDate;
  const pl = PERIODS.find(p=>p.days===periodDays)?.label||'기간';
  let html = '';
  SECTORS.forEach(sec => {
    // 섹터 평균
    const chgs = sec.stocks.map(st=>getChg(st.id,d)).filter(Boolean);
    const pChgs = sec.stocks.map(st=>getPeriodChg(st.id,d)).filter(Boolean);
    const avg = chgs.length ? chgs.reduce((a,c)=>a+c.pct,0)/chgs.length : null;
    const pavg = pChgs.length ? pChgs.reduce((a,c)=>a+c.pct,0)/pChgs.length : null;

    // 종목 등락률 순 정렬
    const sorted = [...sec.stocks].sort((a,b)=>{
      const ca=getChg(a.id,d), cb=getChg(b.id,d);
      if (!ca&&!cb) return 0; if (!ca) return 1; if (!cb) return -1;
      return cb.pct - ca.pct;
    });

    html += `<div class="sector-card">
      <div class="sector-card-head">
        <span class="sector-name">${sec.name}</span>
        <div class="sector-badges">
          <span class="badge-label">전일</span>
          <span class="badge ${badgeCls({pct:avg??0})}">${avg!=null?(avg>=0?'+':'')+avg.toFixed(2)+'%':'—'}</span>
          <span class="badge-label">${pl}</span>
          <span class="badge ${badgeCls({pct:pavg??0})}">${pavg!=null?(pavg>=0?'+':'')+pavg.toFixed(2)+'%':'—'}</span>
        </div>
      </div>
      <div class="sector-stocks">`;

    sorted.forEach(st => {
      const p = getPrice(st.id, d);
      const chg = getChg(st.id, d);
      const pchg = getPeriodChg(st.id, d);
      html += `<div class="stock-row">
        <div class="stock-left">
          <span class="stock-ticker">${st.ticker}</span>
          <span class="stock-name">${st.name}</span>
        </div>
        <div class="stock-right">
          <span class="stock-price">${fmtPrice(p)}</span>
          <div class="chg-row">
            <span class="mbadge ${badgeCls(chg)}">${fmtPct(chg)}</span>
            <span class="mbadge period ${badgeCls(pchg)}">${fmtPct(pchg)}</span>
          </div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  document.getElementById('sectorsList').innerHTML = html;
}

// ── SYNC (현재가 불러오기) ──
let _cancel2 = false;
function cancelFetch() { _cancel2 = true; }

async function onSync() {
  const d = selectedDate || ALL_DATES[0];
  _cancel2 = false;
  const btn = document.getElementById('syncBtn');
  btn.classList.add('spinning');

  // 20개 이상이면 오버레이, 아니면 조용히
  showLoad(true, '⚡ 현재가 불러오는 중', d);

  const allStocks = SECTORS.flatMap(s=>s.stocks);
  let done = 0;

  for (let i = 0; i < allStocks.length; i += 10) {
    if (_cancel2) break;
    await Promise.all(allStocks.slice(i,i+10).map(async st => {
      try {
        const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const data = await r.json();
        if (data.c && data.c > 0) {
          if (!prices[d]) prices[d] = {};
          prices[d][st.id] = data.c;
          const pd = getPrevDate(d);
          if (pd && !getPrice(st.id, pd)) {
            if (!prices[pd]) prices[pd] = {};
            prices[pd][st.id] = data.pc;
          }
        }
      } catch(e) {}
      done++;
      updateLoad(done, allStocks.length, allStocks[i].ticker);
    }));
    if (i+10 < allStocks.length) await new Promise(r=>setTimeout(r,600));
  }

  save(); showLoad(false);
  btn.classList.remove('spinning');
  document.getElementById('lastSync').textContent = d.slice(5);
  renderAll();
  toast(`✅ ${done}개 갱신 완료`);
}

function showLoad(show, title='', sub='') {
  document.getElementById('loadOverlay').classList.toggle('show', show);
  if (show) {
    document.getElementById('loadTitle').textContent = title;
    document.getElementById('loadSub').textContent = sub;
    document.getElementById('loadBar').style.width = '0%';
  }
}
function updateLoad(done, total, ticker='') {
  const pct = Math.round(done/total*100);
  document.getElementById('loadBar').style.width = pct+'%';
  document.getElementById('loadSub').textContent = `${done}/${total} · ${ticker}`;
}

// ── VIEW SWITCH ──
function switchView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  // 스크롤 상단 복귀
  document.getElementById('scrollArea').scrollTop = 0;
  renderAll();
}

// ── RENDER ALL ──
function renderAll() {
  renderPeriodTabs('periodTabs');
  renderPeriodTabs('periodTabs2');
  renderSummary();
  if (currentView === 'sector') renderSectors();
  else if (currentView === 'table') renderTable();
  else if (currentView === 'chart') { renderChartPicker(); renderChart(); }
  else if (currentView === 'settings') renderSettings();
}

// ── TOAST ──
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── INIT ──
load();
loadRemote().then(()=>renderAll());
renderAll();
</script>
</body>
