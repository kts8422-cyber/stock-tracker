name: Daily Stock Fetch

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 한국시간 07:00 (장 시작 전)
    - cron: "0 13 * * 1-5"   # 한국시간 22:00 (장 마감 후 종가)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Check secret
        run: |
          if [ -z "${{ secrets.FINNHUB_KEY }}" ]; then
            echo "ERROR: FINNHUB_KEY secret is not set!"
            exit 1
          fi
          echo "Secret OK"

      - name: Fetch prices
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python fetch_prices.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: price update $(date -u +%Y-%m-%d\ %H:%M)"
          git push
