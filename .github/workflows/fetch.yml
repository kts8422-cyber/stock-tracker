name: Daily Stock Fetch

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 매주 월~금 UTC 22:00 (한국시간 07:00)
  workflow_dispatch:           # 수동 실행 버튼도 제공

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Fetch prices
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python fetch_prices.py

      - name: Commit & push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "auto: daily price update $(date -u +%Y-%m-%d)"
          git push
