# SectorTrack - Daily Stock Price Fetcher
name: Daily Stock Fetch

on:
  schedule:
    - cron: "0 21 * * 1-5"   # UTC 21:00 = ET 17:00 (장 마감 후 종가)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Fetch prices
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python fetch_prices.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "변경없음" && exit 0
          git commit -m "auto: price update $(date -u +%Y-%m-%d\ %H:%M)"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
