<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SectorTrack">
<meta name="theme-color" content="#080b12">
<title>SectorTrack</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#080b12; --surface:#0f1520; --card:#131c2e; --border:#1c2a3e;
  --accent:#3b82f6; --accent-dim:rgba(59,130,246,.15);
  --green:#22c55e; --green-dim:rgba(34,197,94,.13);
  --red:#ef4444; --red-dim:rgba(239,68,68,.13);
  --text:#f1f5f9; --text2:#94a3b8; --text3:#475569;
  --mono:'DM Mono',monospace; --sans:'DM Sans',sans-serif;
  --nav-h:64px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100dvh}

/* HEADER */
.app-header{
  height:calc(52px + var(--safe-top)); padding-top:var(--safe-top);
  background:rgba(8,11,18,.96); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  padding-left:16px; padding-right:16px; flex-shrink:0;
}
.app-logo{font-family:var(--mono);font-size:.95rem;font-weight:500;letter-spacing:-.5px}
.app-logo em{color:var(--accent);font-style:normal}
.header-right{display:flex;align-items:center;gap:8px}
.sync-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:.95rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.sync-btn:active{transform:scale(.9);background:var(--accent-dim);color:var(--accent)}
.sync-btn.spinning{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-sync{font-family:var(--mono);font-size:.6rem;color:var(--text3)}

/* SCROLL */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 8px)}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* ── CALENDAR VIEW ── */
.cal-nav{
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px 8px; position:sticky; top:0; z-index:10;
  background:rgba(8,11,18,.95); backdrop-filter:blur(10px);
}
.cal-month-label{font-family:var(--mono);font-size:.95rem;font-weight:500;color:var(--text)}
.cal-nav-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s}
.cal-nav-btn:active{background:var(--accent-dim);color:var(--accent)}

/* DAY HEADERS */
.cal-dow{
  display:grid; grid-template-columns:repeat(7,1fr);
  padding:0 8px 4px;
}
.cal-dow-cell{
  text-align:center; font-family:var(--mono); font-size:.6rem;
  color:var(--text3); padding:4px 0; letter-spacing:.5px;
}
.cal-dow-cell.sun{color:#ef4444} .cal-dow-cell.sat{color:#3b82f6}

/* CALENDAR GRID */
.cal-grid{
  display:grid; grid-template-columns:repeat(7,1fr);
  gap:1px; padding:0 8px 8px; background:var(--border);
  border-radius:12px; overflow:hidden; margin:0 8px;
}
.cal-cell{
  background:var(--bg); min-height:72px;
  padding:5px 4px 4px; position:relative;
  cursor:pointer; transition:background .12s;
  display:flex; flex-direction:column;
}
.cal-cell.empty{background:#070a10;cursor:default}
.cal-cell.weekend-sat .cal-day{color:#3b82f6}
.cal-cell.weekend-sun .cal-day{color:#ef4444}
.cal-cell.today{background:rgba(59,130,246,.07)}
.cal-cell.today .cal-day{
  background:var(--accent); color:#fff; border-radius:50%;
  width:20px; height:20px; display:flex; align-items:center; justify-content:center;
}
.cal-cell.has-data{background:#0c1220}
.cal-cell.has-data:active{background:#101928}
.cal-cell.selected{background:rgba(59,130,246,.12)!important;outline:1px solid var(--accent)}

.cal-day{font-family:var(--mono);font-size:.72rem;font-weight:500;color:var(--text2);line-height:1;margin-bottom:3px;width:20px;height:20px;display:flex;align-items:center;justify-content:center}
.cal-sectors{display:flex;flex-direction:column;gap:1.5px;margin-top:1px}
.cal-sector-tag{
  font-family:var(--mono); font-size:.52rem; font-weight:500;
  line-height:1.3; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  padding:1px 3px; border-radius:3px;
}
.cal-sector-tag.up{color:var(--green);background:var(--green-dim)}
.cal-sector-tag.dn{color:var(--red);background:var(--red-dim)}
.cal-sector-tag.flat{color:var(--text3);background:rgba(71,85,105,.12)}

/* ── DETAIL SHEET (날짜 클릭 시) ── */
#detailSheet{
  position:fixed; inset:0; z-index:100;
  display:none; flex-direction:column;
  background:var(--bg);
}
#detailSheet.open{display:flex}
.detail-header{
  display:flex; align-items:center; gap:12px;
  padding:calc(14px + var(--safe-top)) 16px 12px;
  border-bottom:1px solid var(--border);
  background:rgba(8,11,18,.96); backdrop-filter:blur(20px);
}
.detail-back{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);
  background:var(--surface);color:var(--text2);font-size:1rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.detail-date{font-family:var(--mono);font-size:.95rem;font-weight:500}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px}

/* period tabs in detail */
.period-tabs{display:flex;gap:5px;padding:0 0 10px;overflow-x:auto;scrollbar-width:none}
.period-tabs::-webkit-scrollbar{display:none}
.period-tab{font-family:var(--mono);font-size:.68rem;padding:4px 11px;border-radius:18px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .18s}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:500}

/* sector block in detail */
.detail-sector{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:10px}
.detail-sector-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 13px 8px; border-bottom:1px solid var(--border);
}
.detail-sector-name{font-size:.76rem;font-weight:600;color:var(--text2)}
.detail-badges{display:flex;gap:4px;align-items:center}
.badge{font-family:var(--mono);font-size:.66rem;font-weight:500;padding:3px 7px;border-radius:7px}
.badge-lbl{font-size:.54rem;color:var(--text3);font-family:var(--mono)}
.badge.up{background:var(--green-dim);color:var(--green)}
.badge.dn{background:var(--red-dim);color:var(--red)}
.badge.flat{background:rgba(71,85,105,.15);color:var(--text3)}

.detail-stock{display:flex;justify-content:space-between;align-items:center;padding:8px 13px;border-bottom:1px solid rgba(28,42,62,.4)}
.detail-stock:last-child{border-bottom:none}
.ds-left{display:flex;flex-direction:column;gap:2px}
.ds-ticker{font-family:var(--mono);font-size:.8rem;font-weight:500}
.ds-name{font-size:.67rem;color:var(--text3)}
.ds-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.ds-price{font-family:var(--mono);font-size:.76rem;color:var(--text2)}
.chg-row{display:flex;gap:4px}
.mbadge{font-family:var(--mono);font-size:.62rem;font-weight:500;padding:2px 6px;border-radius:5px}
.mbadge.up{background:var(--green-dim);color:var(--green)}
.mbadge.dn{background:var(--red-dim);color:var(--red)}
.mbadge.flat{background:rgba(71,85,105,.15);color:var(--text3)}
.mbadge.period{opacity:.75}

/* ── TABLE VIEW ── */
.table-period-tabs{padding:10px 16px 4px}
.table-section{padding:0 14px}
.table-section-title{font-family:var(--mono);font-size:.63rem;color:var(--text3);
  letter-spacing:.8px;text-transform:uppercase;padding:10px 0 5px;
  border-bottom:1px solid var(--border);margin-bottom:3px}
.table-row{display:flex;justify-content:space-between;align-items:center;
  padding:8px 4px;border-bottom:1px solid rgba(28,42,62,.4)}
.table-row:last-child{border-bottom:none}
.tr-l{display:flex;flex-direction:column;gap:2px}
.tr-ticker{font-family:var(--mono);font-size:.78rem;font-weight:500}
.tr-name{font-size:.66rem;color:var(--text3)}
.tr-r{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.tr-price{font-family:var(--mono);font-size:.75rem;color:var(--text2)}
.divider{height:1px;background:var(--border);margin:0 14px 6px}

/* ── CHART VIEW ── */
.chart-section{padding:12px 14px}
.chart-picker{display:flex;gap:5px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.chart-picker::-webkit-scrollbar{display:none}
.chart-pick-btn{font-family:var(--mono);font-size:.65rem;padding:4px 10px;border-radius:13px;
  border:1px solid var(--border);background:transparent;color:var(--text3);
  cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chart-pick-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent)}
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}

/* ── SETTINGS ── */
.settings-section{padding:14px}
.settings-title{font-family:var(--mono);font-size:.62rem;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}
.sr-label{font-size:.8rem;color:var(--text)}
.sr-sub{font-size:.68rem;color:var(--text3);margin-top:2px}
.sr-action{font-family:var(--mono);font-size:.7rem;color:var(--accent);cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-bottom));padding-bottom:var(--safe-bottom);
  background:rgba(8,11,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);display:flex;z-index:50}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;color:var(--text3);font-size:.58rem;font-family:var(--mono);
  border:none;background:none;padding-top:4px;transition:color .15s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:1.15rem;line-height:1}

/* LOADING */
#loadOverlay{position:fixed;inset:0;background:rgba(8,11,18,.9);backdrop-filter:blur(8px);
  z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#loadOverlay.show{display:flex}
.load-title{font-family:var(--mono);font-size:.82rem;color:var(--accent)}
.load-bar-bg{width:200px;height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.load-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.load-sub{font-family:var(--mono);font-size:.66rem;color:var(--text3)}
.load-cancel{font-family:var(--mono);font-size:.63rem;color:var(--text3);cursor:pointer;margin-top:4px;text-decoration:underline}

/* TOAST */
#toast{position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + 10px);
  left:50%;transform:translateX(-50%) translateY(18px);
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:var(--mono);font-size:.72rem;padding:8px 16px;border-radius:18px;
  opacity:0;transition:all .25s;z-index:100;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-logo">SECTOR<em>TRACK</em></div>
    <div class="header-right">
      <span class="last-sync" id="lastSync">—</span>
      <button class="sync-btn" id="syncBtn" onclick="onSync()">↻</button>
    </div>
  </div>

  <div class="scroll-area" id="scrollArea">

    <!-- CALENDAR VIEW -->
    <div class="view active" id="viewCalendar">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="moveMonth(-1)">‹</button>
        <span class="cal-month-label" id="calMonthLabel"></span>
        <button class="cal-nav-btn" onclick="moveMonth(1)">›</button>
      </div>
      <div class="cal-dow">
        <div class="cal-dow-cell sun">일</div>
        <div class="cal-dow-cell">월</div>
        <div class="cal-dow-cell">화</div>
        <div class="cal-dow-cell">수</div>
        <div class="cal-dow-cell">목</div>
        <div class="cal-dow-cell">금</div>
        <div class="cal-dow-cell sat">토</div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
    </div>

    <!-- TABLE VIEW -->
    <div class="view" id="viewTable">
      <div class="table-period-tabs">
        <div class="period-tabs" id="periodTabsTable"></div>
      </div>
      <div id="tableContent"></div>
    </div>

    <!-- CHART VIEW -->
    <div class="view" id="viewChart">
      <div class="chart-section">
        <div class="chart-picker" id="chartPicker"></div>
        <div class="chart-wrap"><canvas id="myChart" height="300"></canvas></div>
      </div>
    </div>

    <!-- SETTINGS VIEW -->
    <div class="view" id="viewSettings">
      <div class="settings-section">
        <div class="settings-title">데이터</div>
        <div class="setting-row">
          <div><div class="sr-label">현재가 갱신</div><div class="sr-sub">Finnhub · 오늘 기준</div></div>
          <span class="sr-action" onclick="onSync()">실행 →</span>
        </div>
        <div class="setting-row">
          <div><div class="sr-label">저장 날짜 수</div><div class="sr-sub" id="storedLabel">0일</div></div>
        </div>
        <div class="setting-row">
          <div><div class="sr-label">총 종목</div><div class="sr-sub" id="stockCountLabel">—</div></div>
        </div>
        <div style="height:12px"></div>
        <div class="settings-title">앱</div>
        <div class="setting-row" style="cursor:pointer" onclick="clearData()">
          <div><div class="sr-label" style="color:var(--red)">데이터 초기화</div><div class="sr-sub">저장된 가격 전체 삭제</div></div>
          <span style="color:var(--red)">→</span>
        </div>
      </div>
    </div>

  </div><!-- /scroll-area -->

  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-calendar" onclick="switchView('calendar')"><span class="nav-icon">📅</span><span>달력</span></button>
    <button class="nav-item" id="nav-table" onclick="switchView('table')"><span class="nav-icon">≡</span><span>종목</span></button>
    <button class="nav-item" id="nav-chart" onclick="switchView('chart')"><span class="nav-icon">◈</span><span>차트</span></button>
    <button class="nav-item" id="nav-settings" onclick="switchView('settings')"><span class="nav-icon">◎</span><span>설정</span></button>
  </nav>
</div>

<!-- DETAIL SHEET -->
<div id="detailSheet">
  <div class="detail-header">
    <button class="detail-back" onclick="closeDetail()">‹</button>
    <span class="detail-date" id="detailDateLabel"></span>
    <div style="margin-left:auto">
      <button class="sync-btn" onclick="onSyncDate()" title="이 날 가격 갱신">↻</button>
    </div>
  </div>
  <div class="detail-scroll">
    <div class="period-tabs" id="periodTabsDetail" style="padding-bottom:10px"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loadOverlay">
  <div class="load-title" id="loadTitle">데이터 불러오는 중...</div>
  <div class="load-bar-bg"><div class="load-bar-fill" id="loadBar" style="width:0%"></div></div>
  <div class="load-sub" id="loadSub"></div>
  <div class="load-cancel" onclick="_cancel=true">취소</div>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>

// ── PERSIST ──
function load(){
  try{
    const s=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');
    if(s.prices) prices=s.prices;
    if(s.periodDays!=null) periodDays=s.periodDays;
  }catch(e){}
}
function save(){ localStorage.setItem(STORAGE_KEY,JSON.stringify({prices,periodDays})); }

// ── REMOTE ──
async function loadRemote(){
  try{
    const r=await fetch('./data.json?t='+Date.now());
    if(r.ok){
      remotePrices=await r.json();
      const dates=Object.keys(remotePrices).sort().reverse();
      if(dates[0]) document.getElementById('lastSync').textContent=dates[0].slice(5);
    }
  }catch(e){}
}

// ── PRICE HELPERS ──
function getPrice(sid,date){ return prices[date]?.[sid]??remotePrices[date]?.[sid]??null; }
function getPrevDate(date){ const i=ALL_DATES.indexOf(date); return(i>=0&&i<ALL_DATES.length-1)?ALL_DATES[i+1]:null; }
function getPeriodDate(date,days){
  const i=ALL_DATES.indexOf(date); if(i<0) return null;
  if(days==='ytd'){ const yr=date.slice(0,4); return[...ALL_DATES].reverse().find(d=>d.startsWith(yr))||null; }
  return ALL_DATES[Math.min(i+days,ALL_DATES.length-1)];
}
function getChg(sid,date){
  const cur=getPrice(sid,date),prev=getPrice(sid,getPrevDate(date));
  if(cur==null||prev==null||prev===0) return null;
  return{pct:(cur-prev)/prev*100,abs:cur-prev};
}
function getPeriodChg(sid,date){
  const cur=getPrice(sid,date),pd=getPeriodDate(date,periodDays);
  if(!pd||pd===date) return null;
  const base=getPrice(sid,pd);
  if(cur==null||base==null||base===0) return null;
  return{pct:(cur-base)/base*100,abs:cur-base};
}
function sectorAvgChg(sec,date){
  const chgs=sec.stocks.map(st=>getChg(st.id,date)).filter(Boolean);
  return chgs.length?chgs.reduce((a,c)=>a+c.pct,0)/chgs.length:null;
}
function sectorAvgPeriodChg(sec,date){
  const chgs=sec.stocks.map(st=>getPeriodChg(st.id,date)).filter(Boolean);
  return chgs.length?chgs.reduce((a,c)=>a+c.pct,0)/chgs.length:null;
}
function badgeCls(v){ if(v==null) return 'flat'; return v>0?'up':v<0?'dn':'flat'; }
function fmtPct(v,withSign=true){ if(v==null) return '—'; return(withSign&&v>=0?'+':'')+v.toFixed(2)+'%'; }
function fmtPrice(p){ return p!=null?'$'+p.toFixed(2):'—'; }

// ── CALENDAR ──
function moveMonth(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  // clamp 2025~2030
  if(calYear<2025){calYear=2025;calMonth=0;}
  if(calYear>2030){calYear=2030;calMonth=11;}
  renderCalendar();
}

function renderCalendar(){
  const KO_MONTHS=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonthLabel').textContent=`${calYear}년 ${KO_MONTHS[calMonth]}`;

  const firstDay=new Date(calYear,calMonth,1).getDay(); // 0=Sun
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();

  let html='';
  // empty cells before first day
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-cell empty"></div>`;

  for(let day=1;day<=daysInMonth;day++){
    const mm=String(calMonth+1).padStart(2,'0');
    const dd=String(day).padStart(2,'0');
    const dateStr=`${calYear}-${mm}-${dd}`;
    const dow=(firstDay+day-1)%7;
    const isToday=dateStr===TODAY;
    const isSat=dow===6, isSun=dow===0;
    const isWeekend=isSat||isSun;
    const isTrading=ALL_DATES.includes(dateStr);

    // 해당 날 데이터 있는지 확인
    const hasData=isTrading&&SECTORS.some(sec=>sec.stocks.some(st=>getPrice(st.id,dateStr)!=null));

    let cls='cal-cell';
    if(isToday) cls+=' today';
    if(isSat) cls+=' weekend-sat';
    if(isSun) cls+=' weekend-sun';
    if(hasData) cls+=' has-data';
    if(selectedDate===dateStr) cls+=' selected';

    // 섹터 태그 (데이터 있는 것만)
    let tagsHtml='';
    if(hasData){
      tagsHtml='<div class="cal-sectors">';
      for(const sec of SECTORS){
        const avg=sectorAvgChg(sec,dateStr);
        if(avg==null) continue;
        const cls2=badgeCls(avg);
        const sign=avg>=0?'+':'';
        tagsHtml+=`<div class="cal-sector-tag ${cls2}">${sec.short} ${sign}${avg.toFixed(1)}%</div>`;
      }
      tagsHtml+='</div>';
    }

    const onclick=isTrading?`onclick="openDetail('${dateStr}')"`:isWeekend?'':'';
    html+=`<div class="${cls}" ${onclick}>
      <div class="cal-day">${day}</div>
      ${tagsHtml}
    </div>`;
  }

  // 마지막 줄 채우기
  const total=firstDay+daysInMonth;
  const remainder=total%7===0?0:7-(total%7);
  for(let i=0;i<remainder;i++) html+=`<div class="cal-cell empty"></div>`;

  document.getElementById('calGrid').innerHTML=html;
}

// ── DETAIL SHEET ──
function openDetail(date){
  selectedDate=date;
  document.getElementById('detailSheet').classList.add('open');
  document.getElementById('detailDateLabel').textContent=date;
  renderPeriodTabs('periodTabsDetail');
  renderDetail();
  renderCalendar(); // update selected highlight
}
function closeDetail(){
  document.getElementById('detailSheet').classList.remove('open');
}

function renderDetail(){
  const d=selectedDate;
  const pl=PERIODS.find(p=>p.days===periodDays)?.label||'기간';
  let html='';
  SECTORS.forEach(sec=>{
    const avg=sectorAvgChg(sec,d);
    const pavg=sectorAvgPeriodChg(sec,d);
    const sorted=[...sec.stocks].sort((a,b)=>{
      const ca=getChg(a.id,d),cb=getChg(b.id,d);
      if(!ca&&!cb)return 0; if(!ca)return 1; if(!cb)return -1;
      return cb.pct-ca.pct;
    });
    html+=`<div class="detail-sector">
      <div class="detail-sector-head">
        <span class="detail-sector-name">${sec.name}</span>
        <div class="detail-badges">
          <span class="badge-lbl">전일</span>
          <span class="badge ${badgeCls(avg)}">${fmtPct(avg)}</span>
          <span class="badge-lbl">${pl}</span>
          <span class="badge ${badgeCls(pavg)}">${fmtPct(pavg)}</span>
        </div>
      </div>`;
    sorted.forEach(st=>{
      const p=getPrice(st.id,d),chg=getChg(st.id,d),pchg=getPeriodChg(st.id,d);
      html+=`<div class="detail-stock">
        <div class="ds-left"><span class="ds-ticker">${st.ticker}</span><span class="ds-name">${st.name}</span></div>
        <div class="ds-right">
          <span class="ds-price">${fmtPrice(p)}</span>
          <div class="chg-row">
            <span class="mbadge ${badgeCls(chg?chg.pct:null)}">${fmtPct(chg?chg.pct:null)}</span>
            <span class="mbadge period ${badgeCls(pchg?pchg.pct:null)}">${fmtPct(pchg?pchg.pct:null)}</span>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  if(!html) html=`<div style="text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:.78rem">데이터 없음<br><br><span style="font-size:.7rem">↻ 버튼으로 가격을 불러오세요</span></div>`;
  document.getElementById('detailContent').innerHTML=html;
}

// ── PERIOD TABS ──
function renderPeriodTabs(id){
  const el=document.getElementById(id); if(!el) return;
  el.innerHTML=PERIODS.map(p=>
    `<button class="period-tab ${p.days===periodDays?'active':''}" onclick="setPeriod(${JSON.stringify(p.days)},this)">${p.label}</button>`
  ).join('');
}
function setPeriod(days){
  periodDays=days; save();
  renderPeriodTabs('periodTabsDetail');
  renderPeriodTabs('periodTabsTable');
  if(document.getElementById('detailSheet').classList.contains('open')) renderDetail();
  if(currentView==='table') renderTable();
}

// ── TABLE VIEW ──
function renderTable(){
  const d=selectedDate||TODAY;
  const pl=PERIODS.find(p=>p.days===periodDays)?.label||'기간';
  let html='';
  SECTORS.forEach(sec=>{
    const sorted=[...sec.stocks].sort((a,b)=>{
      const ca=getChg(a.id,d),cb=getChg(b.id,d);
      if(!ca&&!cb)return 0; if(!ca)return 1; if(!cb)return -1; return cb.pct-ca.pct;
    });
    html+=`<div class="table-section"><div class="table-section-title">${sec.name}</div>`;
    sorted.forEach(st=>{
      const p=getPrice(st.id,d),chg=getChg(st.id,d),pchg=getPeriodChg(st.id,d);
      html+=`<div class="table-row">
        <div class="tr-l"><span class="tr-ticker">${st.ticker}</span><span class="tr-name">${st.name}</span></div>
        <div class="tr-r">
          <span class="tr-price">${fmtPrice(p)}</span>
          <div class="chg-row">
            <span class="mbadge ${badgeCls(chg?chg.pct:null)}">${fmtPct(chg?chg.pct:null)}</span>
            <span class="mbadge period ${badgeCls(pchg?pchg.pct:null)}">${fmtPct(pchg?pchg.pct:null)}</span>
          </div>
        </div>
      </div>`;
    });
    html+=`</div><div class="divider"></div>`;
  });
  document.getElementById('tableContent').innerHTML=html;
}

// ── CHART VIEW ──
function renderChartPicker(){
  document.getElementById('chartPicker').innerHTML=SECTORS.map(s=>
    `<button class="chart-pick-btn ${s.id===selectedSectorForChart?'active':''}" onclick="selectChartSector('${s.id}')">${s.short}</button>`
  ).join('');
}
function selectChartSector(id){ selectedSectorForChart=id; renderChartPicker(); renderChart(); }
function renderChart(){
  const sec=SECTORS.find(s=>s.id===selectedSectorForChart); if(!sec) return;
  const dates=[...ALL_DATES].sort();
  if(chartInstance){chartInstance.destroy();chartInstance=null;}
  const colors=['#3b82f6','#22c55e','#f59e0b','#ef4444','#8b5cf6','#ec4899','#14b8a6','#f97316'];
  chartInstance=new Chart(document.getElementById('myChart').getContext('2d'),{
    type:'line',
    data:{labels:dates.map(d=>d.slice(5).replace('-','/')),
      datasets:sec.stocks.map((st,i)=>({label:st.ticker,data:dates.map(d=>getPrice(st.id,d)),
        borderColor:colors[i%colors.length],tension:.3,pointRadius:0,pointHoverRadius:4,
        fill:false,spanGaps:true,borderWidth:1.5}))},
    options:{responsive:true,
      plugins:{legend:{labels:{color:'#94a3b8',font:{family:'DM Mono',size:10},boxWidth:12}},
        tooltip:{backgroundColor:'#0f1520',titleColor:'#3b82f6',bodyColor:'#f1f5f9',borderColor:'#1c2a3e',borderWidth:1}},
      scales:{
        x:{ticks:{color:'#475569',font:{family:'DM Mono',size:9},maxTicksLimit:12},grid:{color:'#1c2a3e'}},
        y:{ticks:{color:'#475569',font:{family:'DM Mono'},callback:v=>'$'+v},grid:{color:'#1c2a3e'}}}}
  });
}

// ── SETTINGS ──
function renderSettings(){
  const n=Object.keys({...prices,...remotePrices}).length;
  document.getElementById('storedLabel').textContent=n+'일치 데이터';
  document.getElementById('stockCountLabel').textContent=totalStocks+'개 · '+SECTORS.length+'개 섹터';
}
function clearData(){ if(!confirm('전체 삭제?')) return; prices={}; save(); renderAll(); toast('초기화 완료'); }

// ── SYNC ──
async function onSync(){
  const d=TODAY;
  selectedDate=d;
  _cancel=false;
  document.getElementById('syncBtn').classList.add('spinning');
  showLoad(true,'⚡ 현재가 갱신 중',d);
  const allStocks=SECTORS.flatMap(s=>s.stocks);
  let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel) break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){
          if(!prices[d]) prices[d]={};
          prices[d][st.id]=q.c;
          const pd=getPrevDate(d);
          if(pd&&!getPrice(st.id,pd)){if(!prices[pd]) prices[pd]={}; prices[pd][st.id]=q.pc;}
        }
      }catch(e){}
      done++; updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length) await new Promise(r=>setTimeout(r,600));
  }
  save(); showLoad(false);
  document.getElementById('syncBtn').classList.remove('spinning');
  document.getElementById('lastSync').textContent=d.slice(5);
  renderAll();
  if(document.getElementById('detailSheet').classList.contains('open')) renderDetail();
  toast(`✅ ${done}개 갱신 완료`);
}

async function onSyncDate(){
  if(!selectedDate) return onSync();
  await onSyncForDate(selectedDate);
}
async function onSyncForDate(d){
  _cancel=false;
  showLoad(true,'⚡ '+d+' 갱신 중','');
  const allStocks=SECTORS.flatMap(s=>s.stocks);
  let done=0;
  for(let i=0;i<allStocks.length;i+=10){
    if(_cancel) break;
    await Promise.all(allStocks.slice(i,i+10).map(async st=>{
      try{
        const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${st.ticker}&token=${FINNHUB_KEY}`);
        const q=await r.json();
        if(q.c&&q.c>0){if(!prices[d]) prices[d]={}; prices[d][st.id]=q.c;}
      }catch(e){}
      done++; updateLoad(done,allStocks.length,allStocks[i].ticker);
    }));
    if(i+10<allStocks.length) await new Promise(r=>setTimeout(r,600));
  }
  save(); showLoad(false);
  renderCalendar(); renderDetail();
  toast(`✅ ${d} 갱신 완료`);
}

function showLoad(show,title='',sub=''){
  document.getElementById('loadOverlay').classList.toggle('show',show);
  if(show){document.getElementById('loadTitle').textContent=title;document.getElementById('loadSub').textContent=sub;document.getElementById('loadBar').style.width='0%';}
}
function updateLoad(done,total,ticker=''){
  document.getElementById('loadBar').style.width=Math.round(done/total*100)+'%';
  document.getElementById('loadSub').textContent=`${done}/${total} · ${ticker}`;
}

// ── VIEW ──
function switchView(v){
  currentView=v;
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const vEl=document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1));
  if(vEl) vEl.classList.add('active');
  document.getElementById('nav-'+v).classList.add('active');
  document.getElementById('scrollArea').scrollTop=0;
  renderAll();
}

function renderAll(){
  if(currentView==='calendar') renderCalendar();
  else if(currentView==='table'){renderPeriodTabs('periodTabsTable');renderTable();}
  else if(currentView==='chart'){renderChartPicker();renderChart();}
  else if(currentView==='settings') renderSettings();
}

function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}

if(calYear<2025){calYear=2025;calMonth=0;}
